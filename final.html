<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产管理系统</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#f3f4f6',
            danger: '#ef4444',
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="app"></div>

  <script>
    // 资产管理系统
    class AssetManagementSystem {
      constructor() {
        this.assets = [
          {
            id: '1',
            asset_code: 'PC-2026-0001',
            brand: 'Dell',
            model: 'OptiPlex 7090',
            cpu: 'Intel Core i7-10700',
            ram: '16GB DDR4',
            storage: '512GB SSD',
            gpu: 'NVIDIA GeForce GTX 1650',
            os: 'Windows 11 Pro',
            department: '研发部',
            user_name: '张伟',
            location: 'A栋3楼-301',
            status: 'active',
            notes: '高性能开发机器',
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          },
          {
            id: '2',
            asset_code: 'PC-2026-0002',
            brand: 'Lenovo',
            model: 'ThinkPad X1 Carbon',
            cpu: 'Intel Core i5-1135G7',
            ram: '8GB DDR4',
            storage: '256GB SSD',
            gpu: 'Intel Iris Xe Graphics',
            os: 'Windows 10 Pro',
            department: '市场部',
            user_name: '李娜',
            location: 'B栋2楼-205',
            status: 'active',
            notes: '商务笔记本',
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          },
          {
            id: '3',
            asset_code: 'PC-2026-0003',
            brand: 'HP',
            model: 'EliteDesk 800 G6',
            cpu: 'Intel Core i5-10500',
            ram: '8GB DDR4',
            storage: '256GB SSD',
            gpu: 'NVIDIA Quadro P400',
            os: 'Windows 11 Pro',
            department: '设计部',
            user_name: '王芳',
            location: 'C栋4楼-402',
            status: 'active',
            notes: '设计专用机器',
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          }
        ];
        this.selectedIds = [];
        this.currentPage = 'list'; // list, add, edit, detail
        this.editingAsset = null;
        this.currentAssetId = null;
        this.searchTerm = '';
        this.init();
      }

      init() {
        this.render();
      }

      render() {
        const app = document.getElementById('app');
        switch (this.currentPage) {
          case 'list':
            app.innerHTML = this.renderListPage();
            this.addListEventListeners();
            break;
          case 'add':
            app.innerHTML = this.renderAddPage();
            this.addAddEventListeners();
            break;
          case 'edit':
            app.innerHTML = this.renderEditPage();
            this.addEditEventListeners();
            break;
          case 'detail':
            app.innerHTML = this.renderDetailPage();
            this.addDetailEventListeners();
            break;
        }
      }

      getStatusBadge(status) {
        const labels = {
          active: '使用中',
          idle: '闲置',
          maintenance: '维修中'
        };
        const colors = {
          active: 'bg-green-100 text-green-800',
          idle: 'bg-yellow-100 text-yellow-800',
          maintenance: 'bg-red-100 text-red-800'
        };
        return `
          <span class="px-2 py-1 rounded text-xs font-medium ${colors[status] || 'bg-gray-100 text-gray-800'}">
            ${labels[status] || status}
          </span>
        `;
      }

      renderListPage() {
        const filteredAssets = this.assets.filter(asset =>
          asset.asset_code.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
          asset.brand.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
          asset.model.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
          asset.department.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
          asset.user_name.toLowerCase().includes(this.searchTerm.toLowerCase())
        );

        return `
          <header class="bg-white shadow">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
              <h1 class="text-2xl font-bold">资产管理系统</h1>
              <div class="flex items-center gap-4">
                <button id="loginButton" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                  登录
                </button>
              </div>
            </div>
          </header>

          <main class="container mx-auto px-4 py-8">
            <div class="bg-white rounded-lg shadow p-6">
              <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold">资产列表</h2>
                <div class="flex items-center gap-4">
                  <div class="relative">
                    <input
                      type="text"
                      id="searchInput"
                      placeholder="搜索资产..."
                      class="pl-10 pr-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      value="${this.searchTerm}"
                    />
                    <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                  </div>
                  ${this.selectedIds.length > 0 ? `
                    <button id="batchDeleteButton" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
                      删除选中 (${this.selectedIds.length})
                    </button>
                  ` : ''}
                  <button id="addAssetButton" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                    添加资产
                  </button>
                </div>
              </div>

              <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                  <thead class="bg-gray-50">
                    <tr>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-12">
                        <input
                          type="checkbox"
                          id="selectAllCheckbox"
                          ${this.selectedIds.length === filteredAssets.length && filteredAssets.length > 0 ? 'checked' : ''}
                          class="rounded text-blue-600 focus:ring-blue-500"
                        />
                      </th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产编码</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">品牌</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">型号</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CPU</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">内存</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">存储</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">显卡</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作系统</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部门</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">位置</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                  </thead>
                  <tbody class="bg-white divide-y divide-gray-200">
                    ${filteredAssets.map(asset => `
                      <tr class="hover:bg-gray-50 asset-row" data-id="${asset.id}">
                        <td class="px-4 py-3">
                          <input
                            type="checkbox"
                            class="asset-checkbox rounded text-blue-600 focus:ring-blue-500"
                            data-id="${asset.id}"
                            ${this.selectedIds.includes(asset.id) ? 'checked' : ''}
                          />
                        </td>
                        <td class="px-4 py-3 text-sm font-medium text-gray-900">${asset.asset_code}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.brand}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.model}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.cpu}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.ram}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.storage}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.gpu || '-'}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.os}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.department}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.user_name}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${asset.location}</td>
                        <td class="px-4 py-3 text-sm">${this.getStatusBadge(asset.status)}</td>
                        <td class="px-4 py-3 text-sm">
                          <div class="flex items-center gap-2">
                            <button class="edit-button text-blue-500 hover:underline" data-id="${asset.id}">
                              编辑
                            </button>
                            <button class="delete-button text-red-500 hover:underline" data-id="${asset.id}">
                              删除
                            </button>
                          </div>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              ${filteredAssets.length === 0 ? `
                <div class="text-center py-8 text-gray-500">
                  没有找到资产
                </div>
              ` : ''}
            </div>
          </main>
        `;
      }

      renderAddPage() {
        return `
          <header class="bg-white shadow">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
              <div class="flex items-center gap-4">
                <button id="backButton" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                  返回
                </button>
                <h1 class="text-2xl font-bold">添加资产</h1>
              </div>
            </div>
          </header>

          <main class="container mx-auto px-4 py-8">
            <div class="max-w-3xl mx-auto bg-white rounded-lg shadow p-6">
              <form id="addAssetForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label class="block text-gray-700 mb-2">品牌</label>
                    <input
                      type="text"
                      name="brand"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">型号</label>
                    <input
                      type="text"
                      name="model"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">CPU</label>
                    <input
                      type="text"
                      name="cpu"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">内存</label>
                    <input
                      type="text"
                      name="ram"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">存储</label>
                    <input
                      type="text"
                      name="storage"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">显卡</label>
                    <input
                      type="text"
                      name="gpu"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">操作系统</label>
                    <input
                      type="text"
                      name="os"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">部门</label>
                    <input
                      type="text"
                      name="department"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">用户</label>
                    <input
                      type="text"
                      name="user_name"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">位置</label>
                    <input
                      type="text"
                      name="location"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">状态</label>
                    <select
                      name="status"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                      <option value="active">使用中</option>
                      <option value="idle">闲置</option>
                      <option value="maintenance">维修中</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label class="block text-gray-700 mb-2">备注</label>
                  <textarea
                    name="notes"
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    rows="3"
                  ></textarea>
                </div>
                <div class="flex gap-2">
                  <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 flex-1">
                    添加资产
                  </button>
                  <button type="button" id="cancelAddButton" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                    取消
                  </button>
                </div>
              </form>
            </div>
          </main>
        `;
      }

      renderEditPage() {
        const asset = this.assets.find(a => a.id === this.currentAssetId);
        if (!asset) {
          this.currentPage = 'list';
          return this.renderListPage();
        }

        return `
          <header class="bg-white shadow">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
              <div class="flex items-center gap-4">
                <button id="backButton" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                  返回
                </button>
                <h1 class="text-2xl font-bold">编辑资产</h1>
              </div>
            </div>
          </header>

          <main class="container mx-auto px-4 py-8">
            <div class="max-w-3xl mx-auto bg-white rounded-lg shadow p-6">
              <form id="editAssetForm" class="space-y-4">
                <input type="hidden" name="id" value="${asset.id}">
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label class="block text-gray-700 mb-2">品牌</label>
                    <input
                      type="text"
                      name="brand"
                      value="${asset.brand}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">型号</label>
                    <input
                      type="text"
                      name="model"
                      value="${asset.model}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">CPU</label>
                    <input
                      type="text"
                      name="cpu"
                      value="${asset.cpu}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">内存</label>
                    <input
                      type="text"
                      name="ram"
                      value="${asset.ram}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">存储</label>
                    <input
                      type="text"
                      name="storage"
                      value="${asset.storage}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">显卡</label>
                    <input
                      type="text"
                      name="gpu"
                      value="${asset.gpu || ''}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">操作系统</label>
                    <input
                      type="text"
                      name="os"
                      value="${asset.os}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">部门</label>
                    <input
                      type="text"
                      name="department"
                      value="${asset.department}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">用户</label>
                    <input
                      type="text"
                      name="user_name"
                      value="${asset.user_name}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">位置</label>
                    <input
                      type="text"
                      name="location"
                      value="${asset.location}"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">状态</label>
                    <select
                      name="status"
                      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                      <option value="active" ${asset.status === 'active' ? 'selected' : ''}>使用中</option>
                      <option value="idle" ${asset.status === 'idle' ? 'selected' : ''}>闲置</option>
                      <option value="maintenance" ${asset.status === 'maintenance' ? 'selected' : ''}>维修中</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label class="block text-gray-700 mb-2">备注</label>
                  <textarea
                    name="notes"
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    rows="3"
                  >${asset.notes || ''}</textarea>
                </div>
                <div class="flex gap-2">
                  <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 flex-1">
                    更新资产
                  </button>
                  <button type="button" id="cancelEditButton" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                    取消
                  </button>
                </div>
              </form>
            </div>
          </main>
        `;
      }

      renderDetailPage() {
        const asset = this.assets.find(a => a.id === this.currentAssetId);
        if (!asset) {
          this.currentPage = 'list';
          return this.renderListPage();
        }

        return `
          <header class="bg-white shadow">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
              <div class="flex items-center gap-4">
                <button id="backButton" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                  返回
                </button>
                <h1 class="text-2xl font-bold">资产详情</h1>
              </div>
              <div class="flex items-center gap-2">
                <button id="editButton" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600" data-id="${asset.id}">
                  编辑
                </button>
                <button id="deleteButton" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600" data-id="${asset.id}">
                  删除
                </button>
              </div>
            </div>
          </header>

          <main class="container mx-auto px-4 py-8">
            <div class="grid gap-6 md:grid-cols-2">
              <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">基本信息</h2>
                <div class="space-y-4">
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <p class="text-sm text-gray-500">资产编码</p>
                      <p class="text-lg font-medium">${asset.asset_code}</p>
                    </div>
                    <div>
                      <p class="text-sm text-gray-500">状态</p>
                      <div class="mt-1">${this.getStatusBadge(asset.status)}</div>
                    </div>
                    <div>
                      <p class="text-sm text-gray-500">品牌</p>
                      <p class="text-lg">${asset.brand}</p>
                    </div>
                    <div>
                      <p class="text-sm text-gray-500">型号</p>
                      <p class="text-lg">${asset.model}</p>
                    </div>
                  </div>
                </div>
              </div>

              <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">硬件配置</h2>
                <div class="space-y-3">
                  <div>
                    <p class="text-sm text-gray-500">CPU</p>
                    <p class="text-lg">${asset.cpu}</p>
                  </div>
                  <div>
                    <p class="text-sm text-gray-500">内存</p>
                    <p class="text-lg">${asset.ram}</p>
                  </div>
                  <div>
                    <p class="text-sm text-gray-500">存储</p>
                    <p class="text-lg">${asset.storage}</p>
                  </div>
                  <div>
                    <p class="text-sm text-gray-500">显卡</p>
                    <p class="text-lg">${asset.gpu || '未配置'}</p>
                  </div>
                  <div>
                    <p class="text-sm text-gray-500">操作系统</p>
                    <p class="text-lg">${asset.os}</p>
                  </div>
                </div>
              </div>

              <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">使用信息</h2>
                <div class="space-y-3">
                  <div>
                    <p class="text-sm text-gray-500">部门</p>
                    <p class="text-lg">${asset.department}</p>
                  </div>
                  <div>
                    <p class="text-sm text-gray-500">使用人</p>
                    <p class="text-lg">${asset.user_name}</p>
                  </div>
                  <div>
                    <p class="text-sm text-gray-500">位置</p>
                    <p class="text-lg">${asset.location}</p>
                  </div>
                </div>
              </div>

              <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">其他信息</h2>
                <div class="space-y-3">
                  <div>
                    <p class="text-sm text-gray-500">创建时间</p>
                    <p class="text-lg">${new Date(asset.created_at).toLocaleString('zh-CN')}</p>
                  </div>
                  <div>
                    <p class="text-sm text-gray-500">更新时间</p>
                    <p class="text-lg">${new Date(asset.updated_at).toLocaleString('zh-CN')}</p>
                  </div>
                  ${asset.notes && (
                    <div>
                      <p class="text-sm text-gray-500">备注</p>
                      <p class="text-lg mt-2 p-3 bg-gray-100 rounded-md">${asset.notes}</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </main>
        `;
      }

      addListEventListeners() {
        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            this.searchTerm = e.target.value;
            this.render();
          });
        }

        // 全选/取消全选
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');
        if (selectAllCheckbox) {
          selectAllCheckbox.addEventListener('change', (e) => {
            const checked = e.target.checked;
            const checkboxes = document.querySelectorAll('.asset-checkbox');
            this.selectedIds = checked ? 
              Array.from(checkboxes).map(cb => cb.dataset.id) : 
              [];
            this.render();
          });
        }

        // 单个复选框
        const assetCheckboxes = document.querySelectorAll('.asset-checkbox');
        assetCheckboxes.forEach(checkbox => {
          checkbox.addEventListener('change', (e) => {
            const assetId = e.target.dataset.id;
            if (e.target.checked) {
              if (!this.selectedIds.includes(assetId)) {
                this.selectedIds.push(assetId);
              }
            } else {
              this.selectedIds = this.selectedIds.filter(id => id !== assetId);
            }
            this.render();
          });
        });

        // 批量删除
        const batchDeleteButton = document.getElementById('batchDeleteButton');
        if (batchDeleteButton) {
          batchDeleteButton.addEventListener('click', () => {
            if (this.selectedIds.length === 0) {
              alert('请选择要删除的资产');
              return;
            }
            if (confirm(`确定要删除选中的 ${this.selectedIds.length} 个资产吗？`)) {
              this.assets = this.assets.filter(asset => !this.selectedIds.includes(asset.id));
              this.selectedIds = [];
              this.render();
              alert('资产删除成功');
            }
          });
        }

        // 添加资产
        const addAssetButton = document.getElementById('addAssetButton');
        if (addAssetButton) {
          addAssetButton.addEventListener('click', () => {
            this.currentPage = 'add';
            this.render();
          });
        }

        // 编辑资产
        const editButtons = document.querySelectorAll('.edit-button');
        editButtons.forEach(button => {
          button.addEventListener('click', (e) => {
            e.stopPropagation();
            this.currentAssetId = e.target.dataset.id;
            this.currentPage = 'edit';
            this.render();
          });
        });

        // 删除资产
        const deleteButtons = document.querySelectorAll('.delete-button');
        deleteButtons.forEach(button => {
          button.addEventListener('click', (e) => {
            e.stopPropagation();
            const assetId = e.target.dataset.id;
            if (confirm('确定要删除这个资产吗？')) {
              this.assets = this.assets.filter(asset => asset.id !== assetId);
              this.render();
              alert('资产删除成功');
            }
          });
        });

        // 查看详情
        const assetRows = document.querySelectorAll('.asset-row');
        assetRows.forEach(row => {
          row.addEventListener('click', (e) => {
            if (!e.target.closest('button') && !e.target.closest('input[type="checkbox"]')) {
              this.currentAssetId = row.dataset.id;
              this.currentPage = 'detail';
              this.render();
            }
          });
        });

        // 登录按钮
        const loginButton = document.getElementById('loginButton');
        if (loginButton) {
          loginButton.addEventListener('click', () => {
            alert('登录功能开发中');
          });
        }
      }

      addAddEventListeners() {
        // 返回按钮
        const backButton = document.getElementById('backButton');
        if (backButton) {
          backButton.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        // 取消按钮
        const cancelAddButton = document.getElementById('cancelAddButton');
        if (cancelAddButton) {
          cancelAddButton.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        // 表单提交
        const addAssetForm = document.getElementById('addAssetForm');
        if (addAssetForm) {
          addAssetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(addAssetForm);
            const newAsset = {
              id: (this.assets.length + 1).toString(),
              asset_code: `PC-2026-${String(this.assets.length + 1).padStart(4, '0')}`,
              brand: formData.get('brand'),
              model: formData.get('model'),
              cpu: formData.get('cpu'),
              ram: formData.get('ram'),
              storage: formData.get('storage'),
              gpu: formData.get('gpu'),
              os: formData.get('os'),
              department: formData.get('department'),
              user_name: formData.get('user_name'),
              location: formData.get('location'),
              status: formData.get('status'),
              notes: formData.get('notes'),
              created_at: new Date().toISOString(),
              updated_at: new Date().toISOString()
            };
            this.assets.unshift(newAsset);
            this.currentPage = 'list';
            this.render();
            alert('资产添加成功');
          });
        }
      }

      addEditEventListeners() {
        // 返回按钮
        const backButton = document.getElementById('backButton');
        if (backButton) {
          backButton.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        // 取消按钮
        const cancelEditButton = document.getElementById('cancelEditButton');
        if (cancelEditButton) {
          cancelEditButton.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        // 表单提交
        const editAssetForm = document.getElementById('editAssetForm');
        if (editAssetForm) {
          editAssetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(editAssetForm);
            const assetId = formData.get('id');
            const updatedAsset = {
              id: assetId,
              asset_code: this.assets.find(a => a.id === assetId).asset_code,
              brand: formData.get('brand'),
              model: formData.get('model'),
              cpu: formData.get('cpu'),
              ram: formData.get('ram'),
              storage: formData.get('storage'),
              gpu: formData.get('gpu'),
              os: formData.get('os'),
              department: formData.get('department'),
              user_name: formData.get('user_name'),
              location: formData.get('location'),
              status: formData.get('status'),
              notes: formData.get('notes'),
              created_at: this.assets.find(a => a.id === assetId).created_at,
              updated_at: new Date().toISOString()
            };
            this.assets = this.assets.map(asset => asset.id === assetId ? updatedAsset : asset);
            this.currentPage = 'list';
            this.render();
            alert('资产更新成功');
          });
        }
      }

      addDetailEventListeners() {
        // 返回按钮
        const backButton = document.getElementById('backButton');
        if (backButton) {
          backButton.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        // 编辑按钮
        const editButton = document.getElementById('editButton');
        if (editButton) {
          editButton.addEventListener('click', (e) => {
            this.currentAssetId = e.target.dataset.id;
            this.currentPage = 'edit';
            this.render();
          });
        }

        // 删除按钮
        const deleteButton = document.getElementById('deleteButton');
        if (deleteButton) {
          deleteButton.addEventListener('click', (e) => {
            const assetId = e.target.dataset.id;
            if (confirm('确定要删除这个资产吗？')) {
              this.assets = this.assets.filter(asset => asset.id !== assetId);
              this.currentPage = 'list';
              this.render();
              alert('资产删除成功');
            }
          });
        }
      }
    }

    // 初始化应用
    document.addEventListener('DOMContentLoaded', () => {
      new AssetManagementSystem();
    });
  </script>
</body>
</html>
