<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT资产管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-active {
      background: #e6f7ee;
      color: #00a870;
      border: 1px solid #b7ebc9;
    }
    .status-idle {
      background: #fff6e0;
      color: #fa8c16;
      border: 1px solid #ffd591;
    }
    .status-maintenance {
      background: #fff1f0;
      color: #f5222d;
      border: 1px solid #ffccc7;
    }
    .nav-link {
      position: relative;
    }
    .nav-link:hover::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #1890ff;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script>
    class AssetManagementSystem {
      constructor() {
        this.config = this.loadConfig();
        this.assets = this.loadAssets();
        this.users = this.loadUsers();
        this.selectedIds = [];
        this.currentPage = 'list';
        this.currentAssetId = null;
        this.searchTerm = '';
        this.currentUser = this.loadCurrentUser();
        this.departmentFilter = '全部部门';
        this.statusFilter = '全部状态';
        this.init();
      }

      loadAssets() {
        const saved = localStorage.getItem('asset_assets');
        if (saved) return JSON.parse(saved);
        return [
          { id: '1', asset_code: 'PC-2026-0001', brand: 'Lenovo', model: 'ThinkPad X1', cpu: 'Intel Core i7-1165G7', ram: '16GB', storage: '512GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 10 Pro', department: '研发部', user_name: '张伟', location: 'A座301室', status: 'active', notes: '用于开发工作', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '2', asset_code: 'PC-2026-0002', brand: 'ASUS', model: 'ROG Strix', cpu: 'Intel Core i5-14600KF', ram: '32GB', storage: '1TB SSD', gpu: 'NVIDIA RTX 4070', os: 'Windows 11 Pro', department: '设计部', user_name: '李娜', location: 'B座201室', status: 'active', notes: '用于设计工作', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '3', asset_code: 'PC-2026-0003', brand: 'MSI', model: 'GS66 Stealth', cpu: 'Intel Core i5-10400F', ram: '16GB', storage: '512GB SSD', gpu: 'NVIDIA RTX 3060', os: 'Windows 11 Pro', department: '市场部', user_name: '王芳', location: 'C座101室', status: 'idle', notes: '备用设备', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '4', asset_code: 'PC-2026-0004', brand: 'HP', model: 'EliteBook 840 G8', cpu: 'Intel Core i5-1135G7', ram: '8GB', storage: '256GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 10 Pro', department: '行政部', user_name: '赵强', location: 'D座101室', status: 'active', notes: '用于行政工作', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '5', asset_code: 'PC-2026-0005', brand: 'Dell', model: 'XPS 13', cpu: 'Intel Core i7-1185G7', ram: '16GB', storage: '512GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 11 Pro', department: '财务部', user_name: '陈明', location: 'E座101室', status: 'active', notes: '用于财务工作', created_at: '2026-04-15', updated_at: '2026-04-15' }
        ];
      }

      saveAssets() {
        localStorage.setItem('asset_assets', JSON.stringify(this.assets));
      }

      loadUsers() {
        const saved = localStorage.getItem('asset_users');
        if (saved) return JSON.parse(saved);
        return [
          { id: '1', username: 'admin', password: 'admin123', email: 'admin@example.com', created_at: '2026-04-15' }
        ];
      }

      saveUsers() {
        localStorage.setItem('asset_users', JSON.stringify(this.users));
      }

      loadCurrentUser() {
        const saved = localStorage.getItem('asset_current_user');
        return saved ? JSON.parse(saved) : null;
      }

      saveCurrentUser(user) {
        if (user) localStorage.setItem('asset_current_user', JSON.stringify(user));
        else localStorage.removeItem('asset_current_user');
      }

      loadConfig() {
        const saved = localStorage.getItem('asset_config');
        if (saved) return JSON.parse(saved);
        return { deployedUrl: '' };
      }

      saveConfig() {
        localStorage.setItem('asset_config', JSON.stringify(this.config));
      }

      init() {
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        const assetId = urlParams.get('id');
        
        if (action === 'edit' && assetId) {
          this.currentAssetId = assetId;
          this.currentPage = 'quick-edit';
          this.render();
        } else {
          this.currentPage = 'list';
          this.render();
        }
      }

      render() {
        const modal = document.createElement('div');
        modal.id = 'batch-import-modal';
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        modal.innerHTML = '<div class="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">' +
          '<div class="flex items-center justify-between mb-4"><h3 class="text-lg font-semibold">批量导入设备</h3><button id="close-modal-btn" class="text-gray-500 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button></div>' +
          '<div class="mb-4"><p class="text-sm text-gray-600 mb-2">请上传Excel文件（.xlsx格式）</p>' +
          '<div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-500 transition cursor-pointer" id="drop-zone">' +
          '<i class="fa fa-cloud-upload text-4xl text-gray-400 mb-2"></i>' +
          '<p class="text-gray-600">点击或拖拽文件到此处上传</p>' +
          '<input type="file" id="file-input" accept=".xlsx,.xls" class="hidden">' +
          '</div></div>' +
          '<div class="mb-4"><h4 class="font-medium text-gray-800 mb-2">Excel格式要求：</h4>' +
          '<div class="bg-gray-50 rounded-lg p-4 text-sm text-gray-600">' +
          '<p>• 第一行为表头：资产编码,品牌,型号,CPU,内存,存储,显卡,操作系统,部门,使用人,位置,状态,备注</p>' +
          '<p>• 状态填写：使用中/闲置/维修中</p>' +
          '<p>• 资产编码不能重复</p></div></div>' +
          '<div class="flex gap-2 justify-end"><button id="cancel-import-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">取消</button><button id="download-template-btn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">下载模板</button></div>' +
          '<div id="import-result" class="mt-4 hidden"></div></div>';
        
        document.body.appendChild(modal);
        
        const closeModal = () => {
          document.body.removeChild(modal);
        };
        
        document.getElementById('close-modal-btn').addEventListener('click', closeModal);
        document.getElementById('cancel-import-btn').addEventListener('click', closeModal);
        
        document.getElementById('download-template-btn').addEventListener('click', () => {
          const template = '资产编码,品牌,型号,CPU,内存,存储,显卡,操作系统,部门,使用人,位置,状态,备注\nPC-2026-0001,Lenovo,ThinkPad X1,Intel Core i7-1165G7,16GB,512GB SSD,Intel Iris Xe,Windows 10 Pro,研发部,张伟,A座301室,使用中,用于开发工作';
          const blob = new Blob([template], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = '设备导入模板.csv';
          a.click();
          URL.revokeObjectURL(url);
        });
        
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
          e.preventDefault();
          dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });
        
        dropZone.addEventListener('dragleave', () => {
          dropZone.classList.remove('border-blue-500', 'bg-blue-50');
        });
        
        dropZone.addEventListener('drop', (e) => {
          e.preventDefault();
          dropZone.classList.remove('border-blue-500', 'bg-blue-50');
          const files = e.dataTransfer.files;
          if (files.length > 0) {
            this.processImportFile(files[0]);
          }
        });
        
        fileInput.addEventListener('change', (e) => {
          if (e.target.files.length > 0) {
            this.processImportFile(e.target.files[0]);
          }
        });
      }

      processImportFile(file) {
        const resultDiv = document.getElementById('import-result');
        resultDiv.className = 'mt-4';
        resultDiv.innerHTML = '<p class="text-blue-500"><i class="fa fa-spinner fa-spin mr-2"></i>正在处理文件...</p>';
        
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);
            
            let successCount = 0;
            let errorCount = 0;
            const errors = [];
            
            jsonData.forEach((row, index) => {
              try {
                const asset = {
                  id: Date.now().toString() + index,
                  asset_code: row['资产编码'] || 'PC-2026-' + String(this.assets.length + successCount + 1).padStart(4, '0'),
                  brand: row['品牌'] || '',
                  model: row['型号'] || '',
                  cpu: row['CPU'] || '',
                  ram: row['内存'] || '',
                  storage: row['存储'] || '',
                  gpu: row['显卡'] || '',
                  os: row['操作系统'] || '',
                  department: row['部门'] || '',
                  user_name: row['使用人'] || '',
                  location: row['位置'] || '',
                  status: row['状态'] === '使用中' ? 'active' : row['状态'] === '闲置' ? 'idle' : row['状态'] === '维修中' ? 'maintenance' : 'active',
                  notes: row['备注'] || '',
                  created_at: new Date().toISOString().split('T')[0],
                  updated_at: new Date().toISOString().split('T')[0]
                };
                
                if (!asset.brand || !asset.cpu) {
                  throw new Error('品牌和CPU不能为空');
                }
                
                const exists = this.assets.some(a => a.asset_code === asset.asset_code);
                if (exists) {
                  throw new Error('资产编码已存在');
                }
                
                this.assets.push(asset);
                this.saveAssets();
                successCount++;
              } catch (err) {
                errorCount++;
                errors.push('第' + (index + 2) + '行: ' + err.message);
              }
            });
            
            resultDiv.innerHTML = '<div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">' +
              '<p class="text-green-800 font-medium"><i class="fa fa-check-circle mr-2"></i>导入完成</p>' +
              '<p class="text-green-600 text-sm mt-1">成功导入: ' + successCount + ' 条</p>' +
              (errorCount > 0 ? '<p class="text-red-600 text-sm mt-1">失败: ' + errorCount + ' 条</p>' : '') +
              '</div>' +
              (errors.length > 0 ? '<div class="bg-red-50 border border-red-200 rounded-lg p-4"><p class="text-red-800 font-medium mb-2">错误列表：</p><ul class="text-red-600 text-sm space-y-1">' + errors.map(e => '<li>• ' + e + '</li>').join('') + '</ul></div>' : '');
            
            if (successCount > 0) {
              setTimeout(() => {
                document.getElementById('close-modal-btn').click();
                this.render();
              }, 1500);
            }
          } catch (err) {
            resultDiv.innerHTML = '<div class="bg-red-50 border border-red-200 rounded-lg p-4"><p class="text-red-800 font-medium"><i class="fa fa-exclamation-circle mr-2"></i>解析文件失败</p><p class="text-red-600 text-sm mt-1">' + err.message + '</p></div>';
          }
        };
        
        reader.readAsArrayBuffer(file);
      }

      render() {
        const app = document.getElementById('app');
        if (!app) return;

        switch (this.currentPage) {
          case 'list':
            app.innerHTML = this.renderListPage();
            this.addListEventListeners();
            break;
          case 'add':
            app.innerHTML = this.renderAddPage();
            this.addAddEventListeners();
            break;
          case 'edit':
            app.innerHTML = this.renderEditPage();
            this.addEditEventListeners();
            break;
          case 'detail':
            app.innerHTML = this.renderDetailPage();
            this.addDetailEventListeners();
            this.generateQRCode();
            break;
          case 'quick-edit':
            app.innerHTML = this.renderQuickEditPage();
            this.addQuickEditEventListeners();
            break;
          case 'login':
            app.innerHTML = this.renderLoginPage();
            this.addLoginEventListeners();
            break;
          case 'register':
            app.innerHTML = this.renderRegisterPage();
            this.addRegisterEventListeners();
            break;
          default:
            app.innerHTML = this.renderListPage();
            this.addListEventListeners();
        }
      }

      renderLoginPage() {
        return '<div class="min-h-screen flex items-center justify-center bg-gray-100"><div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md"><div class="text-center mb-8"><h1 class="text-3xl font-bold text-gray-800">IT资产管理系统</h1><p class="text-gray-600 mt-2">管理员登录</p></div><form id="login-form" class="space-y-4"><div><label class="block text-gray-700 mb-2">用户名</label><input type="text" name="username" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入用户名" required></div><div><label class="block text-gray-700 mb-2">密码</label><input type="password" name="password" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入密码" required></div><button type="submit" class="w-full px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">登录</button></form><div class="mt-6 text-center"><p class="text-gray-600">没有账户？<a href="#" id="to-register" class="text-blue-500 hover:underline">立即注册</a></p></div><div class="mt-6 p-4 bg-blue-50 rounded-lg"><p class="text-sm text-blue-700"><i class="fa fa-info-circle"></i> 测试账户：admin / admin123</p></div></div></div>';
      }

      renderRegisterPage() {
        return '<div class="min-h-screen flex items-center justify-center bg-gray-100"><div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md"><div class="text-center mb-8"><h1 class="text-3xl font-bold text-gray-800">IT资产管理系统</h1><p class="text-gray-600 mt-2">创建新账户</p></div><form id="register-form" class="space-y-4"><div><label class="block text-gray-700 mb-2">用户名</label><input type="text" name="username" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入用户名" required></div><div><label class="block text-gray-700 mb-2">邮箱</label><input type="email" name="email" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入邮箱" required></div><div><label class="block text-gray-700 mb-2">密码</label><input type="password" name="password" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入密码" required></div><div><label class="block text-gray-700 mb-2">确认密码</label><input type="password" name="confirmPassword" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请再次输入密码" required></div><button type="submit" class="w-full px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">注册</button></form><div class="mt-6 text-center"><p class="text-gray-600">已有账户？<a href="#" id="to-login" class="text-blue-500 hover:underline">立即登录</a></p></div></div></div>';
      }

      renderListPage() {
        const filteredAssets = this.assets.filter(asset => {
          const matchesSearch = asset.asset_code.toLowerCase().includes(this.searchTerm.toLowerCase()) || 
                              asset.brand.toLowerCase().includes(this.searchTerm.toLowerCase()) || 
                              asset.user_name.toLowerCase().includes(this.searchTerm.toLowerCase());
          const matchesDepartment = this.departmentFilter === '全部部门' || asset.department === this.departmentFilter;
          const matchesStatus = this.statusFilter === '全部状态' || 
                              (this.statusFilter === '使用中' && asset.status === 'active') ||
                              (this.statusFilter === '闲置' && asset.status === 'idle') ||
                              (this.statusFilter === '维修中' && asset.status === 'maintenance');
          return matchesSearch && matchesDepartment && matchesStatus;
        });

        const totalAssets = this.assets.length;
        const activeAssets = this.assets.filter(a => a.status === 'active').length;
        const idleAssets = this.assets.filter(a => a.status === 'idle').length;
        const maintenanceAssets = this.assets.filter(a => a.status === 'maintenance').length;

        const departments = [...new Set(this.assets.map(a => a.department))];

        let headerHtml = '<header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10"><div class="container mx-auto px-4 py-3 flex items-center justify-between"><div class="flex items-center gap-4"><div class="flex items-center gap-2"><div class="w-8 h-8 bg-blue-500 rounded-md flex items-center justify-center text-white font-bold">IT</div><h1 class="text-lg font-semibold text-gray-800">IT资产管理系统</h1></div><nav class="hidden md:flex items-center gap-6 text-sm text-gray-600">';
        
        if (this.currentUser) {
          headerHtml += '<a href="#" class="nav-link">硬件台账</a><a href="#" class="nav-link">二维码追踪</a>';
        }
        
        headerHtml += '</nav></div><div class="flex items-center gap-4">';
        
        if (this.currentUser) {
          headerHtml += '<span class="text-sm text-gray-600">' + (this.currentUser.email || this.currentUser.username) + '</span><button id="settings-btn" class="px-3 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm transition" title="系统设置"><i class="fa fa-gear"></i></button><button id="batch-import-btn" class="px-3 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm transition">批量导入</button><button id="add-btn" class="px-3 py-1 bg-green-500 text-white rounded hover:bg-green-600 text-sm transition">+ 新增设备</button><button id="logout-btn" class="px-3 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm transition"><i class="fa fa-sign-out mr-1"></i> 退出</button>';
        } else {
          headerHtml += '<button id="login-btn" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-sm transition">管理员登录</button>';
        }
        
        headerHtml += '</div></div></header>';

        let usageGuideHtml = '<div class="container mx-auto px-4 py-4"><div class="bg-blue-50 rounded-lg p-4 border border-blue-100">';
        usageGuideHtml += '<h3 class="text-sm font-medium text-blue-800 mb-3 flex items-center"><i class="fa fa-info-circle mr-2"></i>使用说明 — 快速上手</h3>';
        usageGuideHtml += '<div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">';
        usageGuideHtml += '<div class="flex gap-3"><div class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">1</div><div><p class="font-medium text-gray-800">登录管理员账号</p><p class="text-gray-600 mt-1">点击右上角「管理员登录」，用邮箱密码登录后可新增、编辑、删除设备。</p></div></div>';
        usageGuideHtml += '<div class="flex gap-3"><div class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">2</div><div><p class="font-medium text-gray-800">录入/导入设备</p><p class="text-gray-600 mt-1">点击「新增设备」逐条录入，或点击「批量导入」上传Excel文件一次性导入所有电脑。</p></div></div>';
        usageGuideHtml += '<div class="flex gap-3"><div class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">3</div><div><p class="font-medium text-gray-800">生成打印二维码</p><p class="text-gray-600 mt-1">点击任一行，进入详情页即可看到二维码，点击「下载编码」保存为PNG后可张贴在设备上。</p></div></div>';
        usageGuideHtml += '<div class="flex gap-3"><div class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">4</div><div><p class="font-medium text-gray-800">扫码更新信息</p><p class="text-gray-600 mt-1">用手机扫设备上的二维码 → 打开详情页 → 登录后点「编辑信息」→ 修改使用人/部门/配置后保存。</p></div></div>';
        usageGuideHtml += '</div></div></div>';

        let statsHtml = '<div class="container mx-auto px-4 py-4"><div class="grid grid-cols-2 md:grid-cols-4 gap-4">';
        statsHtml += '<div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 flex items-center justify-between"><div><p class="text-gray-500 text-sm">资产总数</p><p class="text-2xl font-bold text-gray-800 mt-1">' + totalAssets + '</p></div><div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center"><i class="fa fa-desktop text-blue-500"></i></div></div>';
        statsHtml += '<div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 flex items-center justify-between"><div><p class="text-gray-500 text-sm">使用中</p><p class="text-2xl font-bold text-green-600 mt-1">' + activeAssets + '</p></div><div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center"><i class="fa fa-check-circle text-green-500"></i></div></div>';
        statsHtml += '<div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 flex items-center justify-between"><div><p class="text-gray-500 text-sm">闲置</p><p class="text-2xl font-bold text-orange-600 mt-1">' + idleAssets + '</p></div><div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center"><i class="fa fa-pause-circle text-orange-500"></i></div></div>';

        html += '<div class="mb-6"><h3 class="text-sm font-medium text-gray-700 mb-3 border-b pb-2"><i class="fa fa-desktop mr-1"></i>硬件信息</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm"><div><p class="text-gray-500">资产编码</p><p class="font-medium">' + asset.asset_code + '</p></div><div><p class="text-gray-500">品牌</p><p class="font-medium">' + asset.brand + '</p></div><div><p class="text-gray-500">型号</p><p class="font-medium">' + (asset.model || '-') + '</p></div><div><p class="text-gray-500">CPU</p><p class="font-medium">' + asset.cpu + '</p></div><div><p class="text-gray-500">内存</p><p class="font-medium">' + asset.ram + '</p></div><div><p class="text-gray-500">存储</p><p class="font-medium">' + asset.storage + '</p></div><div><p class="text-gray-500">显卡</p><p class="font-medium">' + (asset.gpu || '-') + '</p></div><div><p class="text-gray-500">操作系统</p><p class="font-medium">' + asset.os + '</p></div></div></div>';
        
        html += '<div class="mb-6"><h3 class="text-sm font-medium text-gray-700 mb-3 border-b pb-2"><i class="fa fa-user mr-1"></i>使用信息</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm"><div><p class="text-gray-500">使用人</p><p class="font-medium">' + asset.user_name + '</p></div><div><p class="text-gray-500">部门</p><p class="font-medium">' + asset.department + '</p></div><div><p class="text-gray-500">位置</p><p class="font-medium">' + asset.location + '</p></div></div></div>';
        
        if (isLoggedIn) {
          html += '<div class="border-t pt-6"><h3 class="text-sm font-medium text-gray-700 mb-3"><i class="fa fa-edit mr-1"></i>修改使用信息</h3><form id="quick-edit-form" class="space-y-4"><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div><label class="block text-gray-700 mb-2 text-sm">使用人</label><input type="text" name="user_name" value="' + asset.user_name + '" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></div><div><label class="block text-gray-700 mb-2 text-sm">部门</label><input type="text" name="department" value="' + asset.department + '" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></div><div><label class="block text-gray-700 mb-2 text-sm">位置</label><input type="text" name="location" value="' + asset.location + '" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></div></div><div class="flex gap-2 mt-4"><button type="submit" class="px-6 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition"><i class="fa fa-save mr-2"></i>保存修改</button><button type="button" id="view-detail-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">查看详情</button></div></form></div>';
        } else {
          html += '<div class="border-t pt-6 text-center"><div class="bg-blue-50 rounded-lg p-6 inline-block"><i class="fa fa-lock text-3xl text-blue-400 mb-3"></i><p class="text-gray-600 mb-4">登录后可修改使用人、部门、位置信息</p><a href="' + this.getAppUrl() + '?action=login&redirect=edit&id=' + asset.id + '" class="inline-block px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition"><i class="fa fa-sign-in mr-2"></i>登录后修改</a></div></div>';
        }
        
        html += '</div></main></div>';
        
        return html;
      }

      addQuickEditEventListeners() {
        const backBtnHeader = document.getElementById('back-btn-header');
        if (backBtnHeader) {
          backBtnHeader.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        const logoutEditBtn = document.getElementById('logout-edit-btn');
        if (logoutEditBtn) {
          logoutEditBtn.addEventListener('click', () => {
            this.currentUser = null;
            this.saveCurrentUser(null);
            this.render();
          });
        }

        const form = document.getElementById('quick-edit-form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            this.assets = this.assets.map(asset => {
              if (asset.id === this.currentAssetId) {
                return { 
                  ...asset, 
                  user_name: formData.get('user_name'),
                  department: formData.get('department'),
                  location: formData.get('location'),
                  updated_at: new Date().toISOString().split('T')[0]
                };
              }
              return asset;
            });
            this.saveAssets();
            
            alert('修改成功！');
            window.location.href = window.location.pathname + '?action=detail&id=' + this.currentAssetId;
          });
        }

        const viewDetailBtn = document.getElementById('view-detail-btn');
        if (viewDetailBtn) {
          viewDetailBtn.addEventListener('click', () => {
            this.currentPage = 'detail';
            this.render();
          });
        }
      }

      addLoginEventListeners() {
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
          loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(loginForm);
            const username = formData.get('username');
            const password = formData.get('password');
            
            const user = this.users.find(u => u.username === username && u.password === password);
            if (user) {
              this.currentUser = user;
              this.saveCurrentUser(user);
              const urlParams = new URLSearchParams(window.location.search);
              const redirect = urlParams.get('redirect');
              const assetId = urlParams.get('id');
              if (redirect === 'edit' && assetId) {
                window.location.href = window.location.pathname + '?action=edit&id=' + assetId;
              } else {
                this.currentPage = 'list';
                this.render();
              }
              alert('登录成功');
            } else {
              alert('用户名或密码错误');
            }
          });
        }

        const toRegister = document.getElementById('to-register');
        if (toRegister) {
          toRegister.addEventListener('click', (e) => {
            e.preventDefault();
            this.currentPage = 'register';
            this.render();
          });
        }
      }

      addRegisterEventListeners() {
        const registerForm = document.getElementById('register-form');
        if (registerForm) {
          registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(registerForm);
            const username = formData.get('username');
            const email = formData.get('email');
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');
            
            if (password !== confirmPassword) {
              alert('两次输入的密码不一致');
              return;
            }
            
            const existingUser = this.users.find(u => u.username === username);
            if (existingUser) {
              alert('用户名已存在');
              return;
            }
            
            const newUser = { id: Date.now().toString(), username, email, password, created_at: new Date().toISOString().split('T')[0] };
            this.users.push(newUser);
            this.saveUsers();
            alert('注册成功，请登录');
            this.currentPage = 'login';
            this.render();
          });
        }

        const toLogin = document.getElementById('to-login');
        if (toLogin) {
          toLogin.addEventListener('click', (e) => {
            e.preventDefault();
            this.currentPage = 'login';
            this.render();
          });
        }
      }

      addListEventListeners() {
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            this.searchTerm = e.target.value;
            this.render();
          });
        }

        const departmentFilter = document.getElementById('department-filter');
        if (departmentFilter) {
          departmentFilter.addEventListener('change', (e) => {
            this.departmentFilter = e.target.value;
            this.render();
          });
        }

        const statusFilter = document.getElementById('status-filter');
        if (statusFilter) {
          statusFilter.addEventListener('change', (e) => {
            this.statusFilter = e.target.value;
            this.render();
          });
        }

        const addBtn = document.getElementById('add-btn');
        if (addBtn) {
          addBtn.addEventListener('click', () => {
            this.currentPage = 'add';
            this.render();
          });
        }

        const batchImportBtn = document.getElementById('batch-import-btn');
        if (batchImportBtn) {
          batchImportBtn.addEventListener('click', () => {
            this.showBatchImportModal();
          });
        }

        const detailBtns = document.querySelectorAll('.detail-btn');
        detailBtns.forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const id = btn.dataset.id;
            this.currentAssetId = id;
            this.currentPage = 'detail';
            this.render();
          });
        });

        const editBtns = document.querySelectorAll('.edit-btn');
        editBtns.forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const id = btn.dataset.id;
            this.currentAssetId = id;
            this.currentPage = 'edit';
            this.render();
          });
        });

        const deleteBtns = document.querySelectorAll('.delete-btn');
        deleteBtns.forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const id = btn.dataset.id;
            if (confirm('确定要删除这个设备吗？')) {
              this.assets = this.assets.filter(asset => asset.id !== id);
              this.saveAssets();
              this.render();
              alert('设备删除成功');
            }
          });
        });

        const rows = document.querySelectorAll('tr[data-id]');
        rows.forEach(row => {
          row.addEventListener('click', () => {
            const id = row.dataset.id;
            this.currentAssetId = id;
            this.currentPage = 'detail';
            this.render();
          });
        });

        const loginBtn = document.getElementById('login-btn');
        if (loginBtn) {
          loginBtn.addEventListener('click', () => {
            this.currentPage = 'login';
            this.render();
          });
        }

        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', () => {
            this.currentUser = null;
            this.saveCurrentUser(null);
            this.currentPage = 'list';
            this.render();
            alert('已退出登录');
          });
        }

        const settingsBtn = document.getElementById('settings-btn');
        if (settingsBtn) {
          settingsBtn.addEventListener('click', () => {
            this.showSettingsModal();
          });
        }
      }

      showSettingsModal() {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        modal.innerHTML = '<div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">' +
          '<div class="flex items-center justify-between mb-4"><h3 class="text-lg font-semibold">系统设置</h3><button id="close-settings-btn" class="text-gray-500 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button></div>' +
          '<div class="space-y-4">' +
          '<div><label class="block text-sm font-medium text-gray-700 mb-2">部署URL（二维码用）</label>' +
          '<input type="text" id="deployed-url-input" value="' + (this.config.deployedUrl || '') + '" placeholder="例: https://yourdomain.com/asset.html" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">' +
          '<p class="text-xs text-gray-500 mt-1">部署到服务器后填入此URL，二维码才能在任何网络环境扫描打开</p></div>' +
          '<div class="flex gap-2"><button id="save-settings-btn" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">保存</button><button id="reset-data-btn" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">重置所有数据</button></div>' +
          '</div></div>';
        document.body.appendChild(modal);

        document.getElementById('close-settings-btn').addEventListener('click', () => {
          document.body.removeChild(modal);
        });

        document.getElementById('save-settings-btn').addEventListener('click', () => {
          const url = document.getElementById('deployed-url-input').value.trim();
          this.config.deployedUrl = url;
          this.saveConfig();
          document.body.removeChild(modal);
          alert('设置已保存');
        });

        document.getElementById('reset-data-btn').addEventListener('click', () => {
          if (confirm('确定要重置所有数据吗？此操作不可恢复！')) {
            localStorage.removeItem('asset_assets');
            localStorage.removeItem('asset_users');
            localStorage.removeItem('asset_current_user');
            localStorage.removeItem('asset_config');
            location.reload();
          }
        });
      }

      addAddEventListeners() {
        const backBtn = document.getElementById('back-btn');
        if (backBtn) {
          backBtn.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        const cancelBtn = document.getElementById('cancel-add-btn');
        if (cancelBtn) {
          cancelBtn.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        const form = document.getElementById('add-form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const newAsset = {
              id: Date.now().toString(),
              asset_code: 'PC-2026-' + String(this.assets.length + 1).padStart(4, '0'),
              brand: formData.get('brand'),
              model: formData.get('model'),
              cpu: formData.get('cpu'),
              ram: formData.get('ram'),
              storage: formData.get('storage'),
              gpu: formData.get('gpu'),
              os: formData.get('os'),
              department: formData.get('department'),
              user_name: formData.get('user_name'),
              location: formData.get('location'),
              status: formData.get('status'),
              notes: formData.get('notes'),
              created_at: new Date().toISOString().split('T')[0],
              updated_at: new Date().toISOString().split('T')[0]
            };
            this.assets.push(newAsset);
            this.saveAssets();
            this.currentPage = 'list';
            this.render();
            alert('设备添加成功');
          });
        }
      }

      addEditEventListeners() {
        const backBtn = document.getElementById('back-btn');
        if (backBtn) {
          backBtn.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        const cancelBtn = document.getElementById('cancel-edit-btn');
        if (cancelBtn) {
          cancelBtn.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        const form = document.getElementById('edit-form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const updatedAsset = {
              brand: formData.get('brand'),
              model: formData.get('model'),
              cpu: formData.get('cpu'),
              ram: formData.get('ram'),
              storage: formData.get('storage'),
              gpu: formData.get('gpu'),
              os: formData.get('os'),
              department: formData.get('department'),
              user_name: formData.get('user_name'),
              location: formData.get('location'),
              status: formData.get('status'),
              notes: formData.get('notes'),
              updated_at: new Date().toISOString().split('T')[0]
            };
            this.assets = this.assets.map(asset => {
              if (asset.id === this.currentAssetId) {
                return { ...asset, ...updatedAsset };
              }
              return asset;
            });
            this.saveAssets();
            this.currentPage = 'list';
            this.render();
            alert('设备更新成功');
          });
        }
      }

      addDetailEventListeners() {
        const backBtn = document.getElementById('back-btn');
        if (backBtn) {
          backBtn.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        const backBtnHeader = document.getElementById('back-btn-header');
        if (backBtnHeader) {
          backBtnHeader.addEventListener('click', () => {
            this.currentPage = 'list';
            this.render();
          });
        }

        const editBtn = document.getElementById('edit-detail-btn');
        if (editBtn) {
          editBtn.addEventListener('click', () => {
            this.currentPage = 'edit';
            this.render();
          });
        }

        const deleteBtn = document.getElementById('delete-detail-btn');
        if (deleteBtn) {
          deleteBtn.addEventListener('click', () => {
            if (confirm('确定要删除这个设备吗？')) {
              this.assets = this.assets.filter(asset => asset.id !== this.currentAssetId);
              this.saveAssets();
              this.currentPage = 'list';
              this.render();
              alert('设备删除成功');
            }
          });
        }

        const downloadQRBtn = document.getElementById('download-qr-btn');
        if (downloadQRBtn) {
          downloadQRBtn.addEventListener('click', () => {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
              const link = document.createElement('a');
              link.download = 'asset-' + this.currentAssetId + '.png';
              link.href = canvas.toDataURL();
              link.click();
              alert('二维码下载成功');
            }
          });
        }
      }

      getAppUrl() {
        if (this.config.deployedUrl) {
          return this.config.deployedUrl;
        }
        return window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/') + window.location.pathname.split('/').pop();
      }

      generateQRCode() {
        const asset = this.assets.find(a => a.id === this.currentAssetId);
        if (!asset) return;

        const qrcodeContainer = document.getElementById('qrcode');
        if (qrcodeContainer) {
          qrcodeContainer.innerHTML = '';
          const appUrl = this.getAppUrl();
          const qrData = appUrl + '?action=edit&id=' + asset.id;
          
          try {
            if (typeof QRCode !== 'undefined') {
              new QRCode(qrcodeContainer, {
                text: qrData,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff'
              });
            } else {
              qrcodeContainer.innerHTML = '<p class="text-red-500">二维码库加载失败</p>';
            }
          } catch (error) {
            qrcodeContainer.innerHTML = '<p class="text-red-500">生成失败</p>';
          }
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new AssetManagementSystem();
    });
  </script>

</html>
