<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT资产管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-active {
      background: #e6f7ee;
      color: #00a870;
      border: 1px solid #b7ebc9;
    }
    .status-idle {
      background: #fff6e0;
      color: #fa8c16;
      border: 1px solid #ffd591;
    }
    .status-maintenance {
      background: #fff1f0;
      color: #f5222d;
      border: 1px solid #ffccc7;
    }
    .nav-link {
      position: relative;
    }
    .nav-link:hover::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #1890ff;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script>
    class AssetManagementSystem {
      constructor() {
        this.config = this.loadConfig();
        this.assets = this.loadAssets();
        this.users = this.loadUsers();
        this.selectedIds = [];
        this.currentPage = 'list';
        this.currentAssetId = null;
        this.searchTerm = '';
        this.currentUser = this.loadCurrentUser();
        this.departmentFilter = '全部部门';
        this.statusFilter = '全部状态';
        this.init();
      }

      loadAssets() {
        const saved = localStorage.getItem('asset_assets');
        if (saved) return JSON.parse(saved);
        return [
          { id: '1', asset_code: 'PC-2026-0001', brand: 'Lenovo', model: 'ThinkPad X1', cpu: 'Intel Core i7-1165G7', ram: '16GB', storage: '512GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 10 Pro', department: '研发部', user_name: '张伟', location: 'A座301室', status: 'active', notes: '用于开发工作', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '2', asset_code: 'PC-2026-0002', brand: 'ASUS', model: 'ROG Strix', cpu: 'Intel Core i5-14600KF', ram: '32GB', storage: '1TB SSD', gpu: 'NVIDIA RTX 4070', os: 'Windows 11 Pro', department: '设计部', user_name: '李娜', location: 'B座201室', status: 'active', notes: '用于设计工作', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '3', asset_code: 'PC-2026-0003', brand: 'MSI', model: 'GS66 Stealth', cpu: 'Intel Core i5-10400F', ram: '16GB', storage: '512GB SSD', gpu: 'NVIDIA RTX 3060', os: 'Windows 11 Pro', department: '市场部', user_name: '王芳', location: 'C座101室', status: 'idle', notes: '备用设备', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '4', asset_code: 'PC-2026-0004', brand: 'HP', model: 'EliteBook 840 G8', cpu: 'Intel Core i5-1135G7', ram: '8GB', storage: '256GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 10 Pro', department: '行政部', user_name: '赵强', location: 'D座101室', status: 'active', notes: '用于行政工作', created_at: '2026-04-15', updated_at: '2026-04-15' },
          { id: '5', asset_code: 'PC-2026-0005', brand: 'Dell', model: 'XPS 13', cpu: 'Intel Core i7-1185G7', ram: '16GB', storage: '512GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 11 Pro', department: '财务部', user_name: '陈明', location: 'E座101室', status: 'active', notes: '用于财务工作', created_at: '2026-04-15', updated_at: '2026-04-15' }
        ];
      }

      saveAssets() {
        localStorage.setItem('asset_assets', JSON.stringify(this.assets));
      }

      loadUsers() {
        const saved = localStorage.getItem('asset_users');
        if (saved) return JSON.parse(saved);
        return [
          { id: '1', username: 'admin', password: '747227185@qq.com', email: '747227185@qq.com', role: 'admin', created_at: '2026-04-15' }
        ];
      }

      saveUsers() {
        localStorage.setItem('asset_users', JSON.stringify(this.users));
      }

      loadCurrentUser() {
        const saved = localStorage.getItem('asset_current_user');
        if (saved) return JSON.parse(saved);
        return null;
      }

      saveCurrentUser(user) {
        if (user) localStorage.setItem('asset_current_user', JSON.stringify(user));
        else localStorage.removeItem('asset_current_user');
      }

      loadConfig() {
        const saved = localStorage.getItem('asset_config');
        if (saved) return JSON.parse(saved);
        return { deployedUrl: 'https://jiayongzhang6-rgb.github.io/asset-management/full-system.html' };
      }

      saveConfig() {
        localStorage.setItem('asset_config', JSON.stringify(this.config));
      }

      init() {
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        const assetId = urlParams.get('id');
        
        if (action === 'edit' && assetId) {
          this.currentAssetId = assetId;
          this.currentPage = 'quick-edit';
        } else if (action === 'login') {
          this.currentPage = 'login';
        } else {
          this.currentPage = 'list';
        }
        this.render();
      }

      render() {
        const app = document.getElementById('app');
        if (!app) return;

        switch (this.currentPage) {
          case 'list':
            app.innerHTML = this.renderListPage();
            this.addListEventListeners();
            break;
          case 'add':
            app.innerHTML = this.renderAddPage();
            this.addAddEventListeners();
            break;
          case 'edit':
            app.innerHTML = this.renderEditPage();
            this.addEditEventListeners();
            break;
          case 'quick-edit':
            app.innerHTML = this.renderQuickEditPage();
            this.addQuickEditEventListeners();
            break;
          case 'detail':
            app.innerHTML = this.renderDetailPage();
            this.addDetailEventListeners();
            this.generateQRCode();
            break;
          case 'login':
            app.innerHTML = this.renderLoginPage();
            this.addLoginEventListeners();
            break;
          case 'register':
            app.innerHTML = this.renderRegisterPage();
            this.addRegisterEventListeners();
            break;
          default:
            app.innerHTML = this.renderListPage();
            this.addListEventListeners();
        }
      }

      renderListPage() {
        const filtered = this.assets.filter(a => {
          const s = this.searchTerm.toLowerCase();
          const matchesSearch = !s || 
            a.asset_code.toLowerCase().includes(s) ||
            a.brand.toLowerCase().includes(s) ||
            a.model.toLowerCase().includes(s) ||
            a.user_name.toLowerCase().includes(s) ||
            a.department.toLowerCase().includes(s) ||
            a.location.toLowerCase().includes(s);
          const matchesDepartment = this.departmentFilter === '全部部门' || a.department === this.departmentFilter;
          const matchesStatus = this.statusFilter === '全部状态' || a.status === this.statusFilter;
          return matchesSearch && matchesDepartment && matchesStatus;
        });

        let h = '<div class="min-h-screen bg-gray-50">';
        h += '<header class="bg-white shadow-sm">';
        h += '<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">';
        h += '<div class="flex items-center">';
        h += '<h1 class="text-xl font-semibold text-gray-800">IT资产管理系统</h1>';
        if (this.currentUser) {
          const roleLabel = this.currentUser.role === 'admin' ? '<span class="px-2 py-1 bg-red-100 text-red-600 text-xs rounded ml-2">管理员</span>' : '<span class="px-2 py-1 bg-blue-100 text-blue-600 text-xs rounded ml-2">普通用户</span>';
          h += '<span class="text-sm text-gray-600 ml-4">' + (this.currentUser.email || this.currentUser.username) + roleLabel + '</span>';
        }
        h += '</div>';
        h += '<div class="flex items-center gap-2">';
        if (this.currentUser) {
          if (this.currentUser.role === 'admin') {
            h += '<button id="batch-import-btn" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">批量导入</button>';
            h += '<button id="add-btn" class="px-3 py-1 bg-green-500 text-white rounded text-sm hover:bg-green-600">+ 新增</button>';
          }
          h += '<button id="settings-btn" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300"><i class="fa fa-cog"></i> 设置</button>';
          h += '<button id="logout-btn" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">退出</button>';
        } else {
          h += '<button id="login-btn" class="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">登录</button>';
        }
        h += '</div>';
        h += '</div>';
        h += '</header>';

        h += '<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">';
        h += '<div class="bg-white shadow-sm rounded-lg p-4">';
        h += '<div class="flex flex-wrap gap-2 mb-4">';
        h += '<div class="flex-grow">';
        h += '<input type="text" id="search-input" placeholder="搜索资产编码、品牌、型号、使用人..." value="' + this.searchTerm + '" class="w-full px-4 py-2 border rounded">';
        h += '</div>';
        h += '<select id="department-filter" class="px-4 py-2 border rounded">';
        h += '<option value="全部部门" ' + (this.departmentFilter === '全部部门' ? 'selected' : '') + '>全部部门</option>';
        const departments = [...new Set(this.assets.map(a => a.department))];
        departments.forEach(dept => {
          h += '<option value="' + dept + '" ' + (this.departmentFilter === dept ? 'selected' : '') + '>' + dept + '</option>';
        });
        h += '</select>';
        h += '<select id="status-filter" class="px-4 py-2 border rounded">';
        h += '<option value="全部状态" ' + (this.statusFilter === '全部状态' ? 'selected' : '') + '>全部状态</option>';
        h += '<option value="active" ' + (this.statusFilter === 'active' ? 'selected' : '') + '>使用中</option>';
        h += '<option value="idle" ' + (this.statusFilter === 'idle' ? 'selected' : '') + '>闲置</option>';
        h += '<option value="maintenance" ' + (this.statusFilter === 'maintenance' ? 'selected' : '') + '>维修中</option>';
        h += '</select>';
        if (this.currentUser && this.currentUser.role === 'admin' && this.selectedIds.length > 0) {
          h += '<button id="batch-delete-btn" class="px-3 py-2 bg-red-500 text-white rounded hover:bg-red-600">批量删除</button>';
        }
        h += '</div>';

        h += '<div class="overflow-x-auto">';
        h += '<table class="min-w-full divide-y divide-gray-200">';
        h += '<thead class="bg-gray-50">';
        h += '<tr>';
        if (this.currentUser && this.currentUser.role === 'admin') {
          h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"><input type="checkbox" id="select-all-checkbox"></th>';
        }
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产编码</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">品牌</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">型号</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CPU</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">内存</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">存储</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">显卡</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">使用人</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部门</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">位置</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>';
        h += '</tr>';
        h += '</thead>';
        h += '<tbody class="bg-white divide-y divide-gray-200">';

        filtered.forEach(asset => {
          h += '<tr>';
          if (this.currentUser && this.currentUser.role === 'admin') {
            h += '<td class="px-4 py-4 whitespace-nowrap"><input type="checkbox" class="asset-checkbox" data-id="' + asset.id + '" ' + (this.selectedIds.includes(asset.id) ? 'checked' : '') + '></td>';
          }
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm font-medium text-gray-900">' + asset.asset_code + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.brand + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.model + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.cpu + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.ram + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.storage + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.gpu + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.user_name + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.department + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">' + asset.location + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap">' + this.getStatusBadge(asset.status) + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm font-medium">';
          h += '<button class="text-blue-600 hover:text-blue-900 mr-2 view-btn" data-id="' + asset.id + '">详情</button>';
          if (this.currentUser && this.currentUser.role === 'admin') {
            h += '<button class="text-green-600 hover:text-green-900 mr-2 edit-btn" data-id="' + asset.id + '">编辑</button>';
            h += '<button class="text-red-600 hover:text-red-900 delete-btn" data-id="' + asset.id + '">删除</button>';
          } else {
            h += '<button class="text-green-600 hover:text-green-900 quick-edit-btn" data-id="' + asset.id + '">修改使用信息</button>';
          }
          h += '</td>';
          h += '</tr>';
        });

        h += '</tbody>';
        h += '</table>';
        h += '</div>';
        h += '<div class="mt-4 text-sm text-gray-600">';
        h += '共 ' + filtered.length + ' 条记录';
        h += '</div>';
        h += '</div>';
        h += '</main>';
        h += '</div>';
        return h;
      }

      getStatusBadge(status) {
        switch (status) {
          case 'active': return '<span class="status-badge status-active">使用中</span>';
          case 'idle': return '<span class="status-badge status-idle">闲置</span>';
          case 'maintenance': return '<span class="status-badge status-maintenance">维修中</span>';
          default: return '<span class="status-badge">' + status + '</span>';
        }
      }

      renderAddPage() {
        let h = '<div class="min-h-screen bg-gray-50">';
        h += '<header class="bg-white shadow-sm">';
        h += '<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center">';
        h += '<button id="back-btn" class="mr-4 text-gray-500 hover:text-gray-700"><i class="fa fa-arrow-left"></i></button>';
        h += '<h1 class="text-xl font-semibold text-gray-800">新增资产</h1>';
        h += '</div>';
        h += '</header>';

        h += '<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">';
        h += '<div class="bg-white shadow-sm rounded-lg p-6">';
        h += '<form id="add-form" class="space-y-4">';
        h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">资产编码</label><input type="text" name="asset_code" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">品牌</label><input type="text" name="brand" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">型号</label><input type="text" name="model" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">CPU</label><input type="text" name="cpu" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">内存</label><input type="text" name="ram" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">存储</label><input type="text" name="storage" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">显卡</label><input type="text" name="gpu" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">操作系统</label><input type="text" name="os" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">使用人</label><input type="text" name="user_name" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">部门</label><input type="text" name="department" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">位置</label><input type="text" name="location" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">状态</label><select name="status" required class="w-full px-4 py-2 border rounded"><option value="active">使用中</option><option value="idle">闲置</option><option value="maintenance">维修中</option></select></div>';
        h += '</div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">备注</label><textarea name="notes" class="w-full px-4 py-2 border rounded" rows="3"></textarea></div>';
        h += '<div class="flex gap-2">';
        h += '<button type="submit" class="px-6 py-2 bg-green-500 text-white rounded hover:bg-green-600">保存</button>';
        h += '<button type="button" id="cancel-add-btn" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">取消</button>';
        h += '</div>';
        h += '</form>';
        h += '</div>';
        h += '</main>';
        h += '</div>';
        return h;
      }

      renderEditPage() {
        const asset = this.assets.find(a => a.id === this.currentAssetId);
        if (!asset) return '<div class="min-h-screen bg-gray-50 flex items-center justify-center"><div class="bg-white p-6 rounded-lg shadow-sm"><p class="text-gray-600">资产不存在</p><button id="back-btn" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">返回</button></div></div>';

        let h = '<div class="min-h-screen bg-gray-50">';
        h += '<header class="bg-white shadow-sm">';
        h += '<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center">';
        h += '<button id="back-btn" class="mr-4 text-gray-500 hover:text-gray-700"><i class="fa fa-arrow-left"></i></button>';
        h += '<h1 class="text-xl font-semibold text-gray-800">编辑资产</h1>';
        h += '</div>';
        h += '</header>';

        h += '<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">';
        h += '<div class="bg-white shadow-sm rounded-lg p-6">';
        h += '<form id="edit-form" class="space-y-4">';
        h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">资产编码</label><input type="text" name="asset_code" value="' + asset.asset_code + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">品牌</label><input type="text" name="brand" value="' + asset.brand + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">型号</label><input type="text" name="model" value="' + asset.model + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">CPU</label><input type="text" name="cpu" value="' + asset.cpu + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">内存</label><input type="text" name="ram" value="' + asset.ram + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">存储</label><input type="text" name="storage" value="' + asset.storage + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">显卡</label><input type="text" name="gpu" value="' + asset.gpu + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">操作系统</label><input type="text" name="os" value="' + asset.os + '" required class="w-full px-4 py-2 border rounded"></div>';
        h += '<div><label class="block text-sm font-medium text-gray-700 mb-1">使用人</label><input type="text" name="user_name" value="' + asset.user_name + '" required class="w-full px-4 py-2 border rounded"></div>';

          if (confirm('确定要删除选中的 ' + this.selectedIds.length + ' 个资产吗？')) {
            this.assets = this.assets.filter(a => !this.selectedIds.includes(a.id));
            this.saveAssets();
            this.selectedIds = [];
            this.render();
          }
        });

        document.getElementById('select-all-checkbox')?.addEventListener('change', (e) => {
          if (e.target.checked) {
            this.selectedIds = this.assets.map(a => a.id);
          } else {
            this.selectedIds = [];
          }
          this.render();
        });

        document.querySelectorAll('.asset-checkbox')?.forEach(checkbox => {
          checkbox.addEventListener('change', (e) => {
            const assetId = e.target.dataset.id;
            if (e.target.checked) {
              this.selectedIds.push(assetId);
            } else {
              this.selectedIds = this.selectedIds.filter(id => id !== assetId);
            }
            this.render();
          });
        });

        document.querySelectorAll('.view-btn')?.forEach(btn => {
          btn.addEventListener('click', (e) => {
            this.currentAssetId = e.target.dataset.id;
            this.currentPage = 'detail';
            this.render();
          });

        document.querySelectorAll('.edit-btn')?.forEach(btn => {
          btn.addEventListener('click', (e) => {
            this.currentAssetId = e.target.dataset.id;
            this.currentPage = 'edit';
            this.render();

        document.querySelectorAll('.quick-edit-btn')?.forEach(btn => {
          btn.addEventListener('click', (e) => {
            this.currentAssetId = e.target.dataset.id;
            this.currentPage = 'quick-edit';
            this.render();
          });

        document.querySelectorAll('.delete-btn')?.forEach(btn => {
          btn.addEventListener('click', (e) => {
            const assetId = e.target.dataset.id;

              this.assets = this.assets.filter(a => a.id !== assetId);
              this.saveAssets();
              this.render();
            }
          });
        });
      }

            const user = this.users.find(u => u.email === email && u.password === password);

              this.currentUser = user;
              this.saveCurrentUser(user);

                this.currentAssetId = urlParams.get('id');
                this.currentPage = 'quick-edit';

                this.currentPage = 'list';
              }
              this.render();
            } else {
              alert('邮箱或密码错误');

          });
        }

          e.preventDefault();
          this.currentPage = 'register';

            e.preventDefault();
            const formData = new FormData(form);
            const username = formData.get('username');
            const email = formData.get('email');
            const password = formData.get('password');
            const existingUser = this.users.find(u => u.username === username || u.email === email);
            if (existingUser) {
              alert('用户名或邮箱已存在');
            } else {
              const user = {
                id: Date.now().toString(),
                username,
                email,
                password,
                role: 'user',
                created_at: new Date().toISOString().split('T')[0]
              };
              this.users.push(user);
              this.saveUsers();
              this.currentUser = user;
              this.saveCurrentUser(user);

              this.render();

          });
        }

        document.getElementById('to-login')?.addEventListener('click', (e) => {
          e.preventDefault();
          this.currentPage = 'login';
          this.render();
        });
      }

      renderSettingsModal() {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        modal.innerHTML = '<div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">' +
          '<div class="flex items-center justify-between mb-4"><h3 class="text-lg font-semibold">系统设置</h3><button id="close-settings-btn" class="text-gray-500 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button></div>' +
          '<div class="space-y-4">' +
          '<div><label class="block text-sm font-medium text-gray-700 mb-2">部署URL（二维码用）</label>' +
          '<input type="text" id="deployed-url-input" value="' + (this.config.deployedUrl || '') + '" placeholder="例: https://yourdomain.com/asset.html" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">' +
          '<p class="text-xs text-gray-500 mt-1">部署到服务器后填入此URL，二维码才能在任何网络环境扫描打开</p></div>' +
          '<div class="flex gap-2"><button id="save-settings-btn" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">保存</button><button id="reset-data-btn" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">重置所有数据</button></div>' +
          '</div></div>';
        document.body.appendChild(modal);

        document.getElementById('close-settings-btn').addEventListener('click', () => {
          document.body.removeChild(modal);
        });

        document.getElementById('save-settings-btn').addEventListener('click', () => {
          const url = document.getElementById('deployed-url-input').value.trim();
          this.config.deployedUrl = url;
          this.saveConfig();
          document.body.removeChild(modal);
          alert('设置已保存');
        });

        document.getElementById('reset-data-btn').addEventListener('click', () => {
          if (confirm('确定要重置所有数据吗？此操作不可恢复！')) {
            localStorage.removeItem('asset_assets');
            localStorage.removeItem('asset_users');
            localStorage.removeItem('asset_current_user');
            localStorage.removeItem('asset_config');
            location.reload();
          }
        });
      }

      renderImportModal() {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        modal.innerHTML = '<div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">' +
          '<div class="flex items-center justify-between mb-4"><h3 class="text-lg font-semibold">批量导入</h3><button id="close-import-btn" class="text-gray-500 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button></div>' +
          '<div class="space-y-4">' +
          '<p class="text-sm text-gray-600">请上传包含资产信息的Excel文件</p>' +
          '<input type="file" id="import-file" accept=".xlsx,.xls" class="w-full px-4 py-2 border rounded">' +
          '<div class="flex gap-2"><button id="import-btn" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">导入</button><button id="cancel-import-btn" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">取消</button></div>' +
          '</div></div>';
        document.body.appendChild(modal);

        document.getElementById('close-import-btn').addEventListener('click', () => {
          document.body.removeChild(modal);
        });

        document.getElementById('cancel-import-btn').addEventListener('click', () => {
          document.body.removeChild(modal);
        });

        document.getElementById('import-btn').addEventListener('click', () => {
          const fileInput = document.getElementById('import-file');
          const file = fileInput.files[0];
          if (!file) {
            alert('请选择文件');
            return;
          }

          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = new Uint8Array(e.target.result);
              const workbook = XLSX.read(data, { type: 'array' });
              const firstSheetName = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[firstSheetName];
              const jsonData = XLSX.utils.sheet_to_json(worksheet);
              
              let added = 0;
              jsonData.forEach(item => {
                if (item.asset_code) {
                  const existing = this.assets.find(a => a.asset_code === item.asset_code);
                  if (!existing) {
                    const asset = {
                      id: Date.now().toString() + added,
                      asset_code: item.asset_code,
                      brand: item.brand || '',
                      model: item.model || '',
                      cpu: item.cpu || '',
                      ram: item.ram || '',
                      storage: item.storage || '',
                      gpu: item.gpu || '',
                      os: item.os || '',
                      user_name: item.user_name || '',
                      department: item.department || '',
                      location: item.location || '',
                      status: item.status || 'active',
                      notes: item.notes || '',
                      created_at: new Date().toISOString().split('T')[0],
                      updated_at: new Date().toISOString().split('T')[0]
                    };
                    this.assets.push(asset);
                    added++;
                  }
                }
              });
              
              this.saveAssets();
              document.body.removeChild(modal);
              alert('导入成功，新增 ' + added + ' 个资产');
              this.render();
            } catch (error) {
              alert('导入失败：' + error.message);
            }
          };
          reader.readAsArrayBuffer(file);
        });
      }

      getAppUrl() {
        if (this.config.deployedUrl) {
          return this.config.deployedUrl;
        }
        return window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/') + window.location.pathname.split('/').pop();
      }

      generateQRCode() {
        const asset = this.assets.find(a => a.id === this.currentAssetId);
        if (!asset) return;

        const qrcodeContainer = document.getElementById('qrcode');
        if (qrcodeContainer) {
          qrcodeContainer.innerHTML = '';
          const appUrl = this.getAppUrl();
          const qrData = appUrl + '?action=edit&id=' + asset.id;
          
          try {
            if (typeof QRCode !== 'undefined') {
              new QRCode(qrcodeContainer, {
                text: qrData,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff'
              });
            } else {
              qrcodeContainer.innerHTML = '<p class="text-red-500">二维码库加载失败</p>';
            }
          } catch (error) {
            qrcodeContainer.innerHTML = '<p class="text-red-500">生成失败</p>';
          }
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new AssetManagementSystem();
    });
  </script>
</body>
</html>
