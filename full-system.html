<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT资产管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>

    }

      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-active {
      background: #e6f7ee;
      color: #00a870;
      border: 1px solid #b7ebc9;
    }
    .status-idle {
      background: #fff6e0;
      color: #fa8c16;
      border: 1px solid #ffd591;
    }
    .status-maintenance {
      background: #fff1f0;
      color: #f5222d;
      border: 1px solid #ffccc7;
    }
    .nav-link {
      position: relative;
    }
    .nav-link:hover::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #1890ff;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script>
    class AssetManagementSystem {
      constructor() {
        this.selectedIds = [];
        this.currentPage = 'list';
        this.currentAssetId = null;
        this.searchTerm = '';
        this.departmentFilter = '全部部门';
        this.statusFilter = '全部状态';
        // 异步初始化
        this.initialize();
      }
      
      async initialize() {
        await this.init();
      }

      async loadAssets() {
        // 首先尝试从Gist加载
        if (this.config.useGist) {
          const gistAssets = await this.loadAssetsFromGist();
          if (gistAssets) {
            localStorage.setItem('asset_assets', JSON.stringify(gistAssets));
            return gistAssets;
          }
        }
        
        // 如果Gist加载失败，从localStorage加载
        const saved = localStorage.getItem('asset_assets');
        if (saved) return JSON.parse(saved);
        
        // 默认数据
        return [
          { id: '1', asset_code: 'PC-2026-0001', brand: 'Lenovo', model: 'ThinkPad X1', cpu: 'Intel Core i7-1165G7', ram: '16GB', storage: '512GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 10 Pro', department: '研发部', user_name: '张伟', location: 'A座301室', status: 'active', notes: '用于开发工作', created_at: '2026-04-15', updated_at: '2026-04-15', history: [] },
          { id: '2', asset_code: 'PC-2026-0002', brand: 'ASUS', model: 'ROG Strix', cpu: 'Intel Core i5-14600KF', ram: '32GB', storage: '1TB SSD', gpu: 'NVIDIA RTX 4070', os: 'Windows 11 Pro', department: '设计部', user_name: '李娜', location: 'B座201室', status: 'active', notes: '用于设计工作', created_at: '2026-04-15', updated_at: '2026-04-15', history: [] },
          { id: '3', asset_code: 'PC-2026-0003', brand: 'MSI', model: 'GS66 Stealth', cpu: 'Intel Core i5-10400F', ram: '16GB', storage: '512GB SSD', gpu: 'NVIDIA RTX 3060', os: 'Windows 11 Pro', department: '市场部', user_name: '王芳', location: 'C座101室', status: 'idle', notes: '备用设备', created_at: '2026-04-15', updated_at: '2026-04-15', history: [] },
          { id: '4', asset_code: 'PC-2026-0004', brand: 'HP', model: 'EliteBook 840 G8', cpu: 'Intel Core i5-1135G7', ram: '8GB', storage: '256GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 10 Pro', department: '行政部', user_name: '赵强', location: 'D座101室', status: 'active', notes: '用于行政工作', created_at: '2026-04-15', updated_at: '2026-04-15', history: [] },
          { id: '5', asset_code: 'PC-2026-0005', brand: 'Dell', model: 'XPS 13', cpu: 'Intel Core i7-1185G7', ram: '16GB', storage: '512GB SSD', gpu: 'Intel Iris Xe', os: 'Windows 11 Pro', department: '财务部', user_name: '陈明', location: 'E座101室', status: 'active', notes: '用于财务工作', created_at: '2026-04-15', updated_at: '2026-04-15', history: [] }
        ];
      }

      async saveAssets() {
        // 保存到localStorage
        localStorage.setItem('asset_assets', JSON.stringify(this.assets));
        
        // 保存到Gist
        if (this.config.useGist) {
          await this.saveAssetsToGist(this.assets);
        }
      }

      loadUsers() {
        const saved = localStorage.getItem('asset_users');
        if (saved) return JSON.parse(saved);
        return [
          { id: '1', username: 'admin', password: '747227185@qq.com', email: '747227185@qq.com', role: 'admin', created_at: '2026-04-15' }
        ];
      }

      saveUsers() {
        localStorage.setItem('asset_users', JSON.stringify(this.users));
      }

      loadCurrentUser() {
        const saved = localStorage.getItem('asset_current_user');
        if (saved) return JSON.parse(saved);
        return null;
      }

      saveCurrentUser(user) {
        if (user) localStorage.setItem('asset_current_user', JSON.stringify(user));
        else localStorage.removeItem('asset_current_user');
      }

      loadConfig() {
        const saved = localStorage.getItem('asset_config');
        if (saved) return JSON.parse(saved);
        return {
          deployedUrl: 'https://jiayongzhang6-rgb.github.io/asset-management/full-system.html',
          gistId: '',
          githubToken: '',
          useGist: false
        };
      }

      saveConfig() {
        localStorage.setItem('asset_config', JSON.stringify(this.config));
      }
      
      // GitHub Gist 数据存储方法
      async loadAssetsFromGist() {
        if (!this.config.useGist || !this.config.gistId || !this.config.githubToken) {
          return null;
        }
        
        try {
          const response = await fetch(`https://api.github.com/gists/${this.config.gistId}`, {
            headers: {
              'Authorization': `token ${this.config.githubToken}`,
              'Accept': 'application/vnd.github.v3+json'
            }
          });
          
          if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
          }
          
          const gist = await response.json();
          const file = gist.files['asset-data.json'];
          if (!file) {
            return null;
          }
          
          return JSON.parse(file.content);
        } catch (error) {
          console.error('Error loading assets from Gist:', error);
          return null;
        }
      }
      
      async saveAssetsToGist(assets) {
        if (!this.config.useGist || !this.config.gistId || !this.config.githubToken) {
          return false;
        }
        
        try {
          const response = await fetch(`https://api.github.com/gists/${this.config.gistId}`, {
            method: 'PATCH',
            headers: {
              'Authorization': `token ${this.config.githubToken}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              files: {
                'asset-data.json': {
                  content: JSON.stringify(assets, null, 2)
                }
              }
            })
          });
          
          if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
          }
          
          return true;
        } catch (error) {
          console.error('Error saving assets to Gist:', error);
          return false;
        }
      }
      
      async createGist() {
        if (!this.config.githubToken) {
          return null;
        }
        
        try {
          const response = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers: {
              'Authorization': `token ${this.config.githubToken}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              description: 'IT Asset Management System Data',
              public: false,
              files: {
                'asset-data.json': {
                  content: JSON.stringify(this.assets, null, 2)
                }
              }
            })
          });
          
          if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
          }
          
          const gist = await response.json();
          return gist.id;
        } catch (error) {
          console.error('Error creating Gist:', error);
          return null;
        }
      }

      async init() {
        // 加载配置
        this.config = this.loadConfig();
        // 加载用户
        this.users = this.loadUsers();
        this.currentUser = this.loadCurrentUser();
        // 异步加载资产
        this.assets = await this.loadAssets();
        
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        const assetId = urlParams.get('id');
        
        if (action === 'edit' && assetId) {
          this.currentAssetId = assetId;
          this.currentPage = 'quick-edit';
        } else if (action === 'login') {
          this.currentPage = 'login';
        } else {
          this.currentPage = 'list';
        }
        this.render();
      }

      render() {
        const app = document.getElementById('app');
        if (!app) return;

        switch (this.currentPage) {
          case 'list':
            app.innerHTML = this.renderListPage();
            this.addListEventListeners();
            break;
          case 'add':
            app.innerHTML = this.renderAddPage();
            this.addAddEventListeners();
            break;
          case 'edit':
            app.innerHTML = this.renderEditPage();
            this.addEditEventListeners();
            break;
          case 'quick-edit':
            app.innerHTML = this.renderQuickEditPage();
            this.addQuickEditEventListeners();
            break;
          case 'detail':
            app.innerHTML = this.renderDetailPage();
            this.addDetailEventListeners();
            this.generateQRCode();
            break;
          case 'login':
            app.innerHTML = this.renderLoginPage();
            this.addLoginEventListeners();
            break;
          case 'register':
            app.innerHTML = this.renderRegisterPage();
            this.addRegisterEventListeners();
            break;
          default:
            app.innerHTML = this.renderListPage();
            this.addListEventListeners();
        }
      }

      renderListPage() {
        const filtered = this.assets.filter(a => {
          const s = this.searchTerm.toLowerCase();
          const matchesSearch = !s || 
            a.asset_code.toLowerCase().includes(s) ||
            a.brand.toLowerCase().includes(s) ||
            a.model.toLowerCase().includes(s) ||
            a.user_name.toLowerCase().includes(s) ||
            a.department.toLowerCase().includes(s) ||
            a.location.toLowerCase().includes(s);
          const matchesDepartment = this.departmentFilter === '全部部门' || a.department === this.departmentFilter;
          const matchesStatus = this.statusFilter === '全部状态' || a.status === this.statusFilter;
          return matchesSearch && matchesDepartment && matchesStatus;
        });

        let h = '<div class="min-h-screen bg-gray-50">';
        h += '<header class="bg-blue-600 text-white">';
        h += '<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">';
        h += '<h1 class="text-xl font-semibold">IT资产管理系统</h1>';
        h += '<div class="flex items-center gap-3">';
        if (this.currentUser) {
          h += '<span class="text-sm">' + (this.currentUser.email || this.currentUser.username) + '</span>';
          if (this.currentUser.role === 'admin') {
            h += '<button id="batch-import-btn" class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">批量导入</button>';
            h += '<button id="add-btn" class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">+ 新增设备</button>';
            h += '<button id="settings-btn" class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100"><i class="fa fa-cog"></i> 设置</button>';
          }
          h += '<button id="logout-btn" class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">退出</button>';
        } else {
          h += '<button id="login-btn" class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">登录</button>';
        }
        h += '</div>';
        h += '</header>';
        h += '<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">';
        
        // 统计卡片
        const totalAssets = this.assets.length;
        const activeAssets = this.assets.filter(a => a.status === 'active').length;
        const idleAssets = this.assets.filter(a => a.status === 'idle').length;
        const scrapAssets = this.assets.filter(a => a.status === 'scrap').length;
        
        h += '<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">';
        h += '<div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">';
        h += '<div class="flex items-center gap-2">';
        h += '<div class="text-blue-600"><i class="fa fa-desktop text-2xl"></i></div>';
        h += '<div>';
        h += '<p class="text-sm text-gray-500">资产总数</p>';
        h += '<p class="text-2xl font-bold text-gray-800">' + totalAssets + '</p>';
        h += '</div>';
        h += '</div>';
        h += '</div>';
        
        h += '<div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">';
        h += '<div class="flex items-center gap-2">';
        h += '<div class="text-green-600"><i class="fa fa-check-circle text-2xl"></i></div>';
        h += '<div>';
        h += '<p class="text-sm text-gray-500">使用中</p>';
        h += '<p class="text-2xl font-bold text-gray-800">' + activeAssets + '</p>';
        h += '</div>';
        h += '</div>';
        h += '</div>';
        
        h += '<div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">';
        h += '<div class="flex items-center gap-2">';
        h += '<div class="text-yellow-600"><i class="fa fa-clock-o text-2xl"></i></div>';
        h += '<div>';
        h += '<p class="text-sm text-gray-500">闲置</p>';
        h += '<p class="text-2xl font-bold text-gray-800">' + idleAssets + '</p>';
        h += '</div>';
        h += '</div>';
        h += '</div>';
        
        h += '<div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">';
        h += '<div class="flex items-center gap-2">';
        h += '<div class="text-red-600"><i class="fa fa-trash text-2xl"></i></div>';
        h += '<div>';
        h += '<p class="text-sm text-gray-500">报废</p>';
        h += '<p class="text-2xl font-bold text-gray-800">' + scrapAssets + '</p>';
        h += '</div>';
        h += '</div>';
        h += '</div>';
        h += '</div>';

        h += '<div class="bg-white shadow-sm rounded-lg p-4">';
        h += '<div class="flex flex-wrap gap-3 mb-4">';
        h += '<div class="flex-grow">';
        h += '<input type="text" id="search-input" placeholder="搜索资产编码、品牌、使用人..." value="' + this.searchTerm + '" class="w-full px-4 py-2 border rounded">';
        h += '</div>';
        h += '<select id="department-filter" class="px-4 py-2 border rounded">';
        h += '<option value="全部部门" ' + (this.departmentFilter === '全部部门' ? 'selected' : '') + '>全部部门</option>';
        const departments = [...new Set(this.assets.map(a => a.department))];
        departments.forEach(dept => {
          h += '<option value="' + dept + '" ' + (this.departmentFilter === dept ? 'selected' : '') + '>' + dept + '</option>';
        });
        h += '</select>';
        h += '<select id="status-filter" class="px-4 py-2 border rounded">';
        h += '<option value="全部状态" ' + (this.statusFilter === '全部状态' ? 'selected' : '') + '>全部状态</option>';
        h += '<option value="active" ' + (this.statusFilter === 'active' ? 'selected' : '') + '>使用中</option>';
        h += '<option value="idle" ' + (this.statusFilter === 'idle' ? 'selected' : '') + '>闲置</option>';
        h += '<option value="maintenance" ' + (this.statusFilter === 'maintenance' ? 'selected' : '') + '>维修中</option>';
        h += '</select>';
        if (this.currentUser && this.currentUser.role === 'admin' && this.selectedIds.length > 0) {
          h += '<button id="batch-delete-btn" class="px-3 py-2 bg-red-500 text-white rounded hover:bg-red-600">批量删除</button>';
        }
        h += '</div>';

        h += '<div class="overflow-x-auto">';
        h += '<table class="min-w-full border border-gray-200">';
        h += '<thead class="bg-gray-50">';
        h += '<tr>';
        if (this.currentUser && this.currentUser.role === 'admin') {
          const isAllSelected = this.assets.length > 0 && this.selectedIds.length === this.assets.length;
          h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b"><input type="checkbox" id="select-all-checkbox" ' + (isAllSelected ? 'checked' : '') + '></th>';
        }
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">资产编码</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">CPU</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">内存</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">硬盘</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">显卡</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">使用人</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">部门</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">位置</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">品牌/型号</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">状态</th>';
        h += '<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b">操作</th>';
        h += '</tr>';
        h += '</thead>';
        h += '<tbody class="bg-white divide-y divide-gray-200">';

        filtered.forEach(asset => {
          h += '<tr class="cursor-pointer hover:bg-gray-50" data-id="' + asset.id + '">';
          if (this.currentUser && this.currentUser.role === 'admin') {
            h += '<td class="px-4 py-4 whitespace-nowrap border-b"><input type="checkbox" class="asset-checkbox" data-id="' + asset.id + '" ' + (this.selectedIds.includes(asset.id) ? 'checked' : '') + ' onclick="event.stopPropagation()"></td>';
          }
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-blue-600 font-medium">' + asset.asset_code + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-gray-500">' + asset.cpu + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-gray-500">' + this.formatStorage(asset.ram) + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-gray-500">' + this.formatStorage(asset.storage) + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-gray-500">' + (asset.gpu || '-') + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-gray-500">' + asset.user_name + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-gray-500">' + asset.department + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b text-sm text-gray-500">' + asset.location + '</td>';
          h += '<td class="px-4 py-4 border-b text-sm text-gray-900">' + asset.brand + ' ' + (asset.model || '') + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap border-b">' + this.getStatusBadge(asset.status) + '</td>';
          h += '<td class="px-4 py-4 whitespace-nowrap text-sm font-medium border-b">';
          if (this.currentUser && this.currentUser.role === 'admin') {
            h += '<button class="text-green-600 hover:text-green-900 mr-2 edit-btn" data-id="' + asset.id + '" onclick="event.stopPropagation()"><i class="fa fa-pencil"></i> 编辑</button>';
            h += '<button class="text-red-600 hover:text-red-900 delete-btn" data-id="' + asset.id + '" onclick="event.stopPropagation()"><i class="fa fa-trash"></i> 删除</button>';
            h += '<button class="text-blue-600 hover:text-blue-900 view-btn" data-id="' + asset.id + '" onclick="event.stopPropagation()"><i class="fa fa-info-circle"></i> 详情</button>';
          } else {
            h += '<button class="text-green-600 hover:text-green-900 quick-edit-btn" data-id="' + asset.id + '" onclick="event.stopPropagation()"><i class="fa fa-pencil"></i> 编辑</button>';
            h += '<button class="text-blue-600 hover:text-blue-900 view-btn" data-id="' + asset.id + '" onclick="event.stopPropagation()"><i class="fa fa-info-circle"></i> 详情</button>';
          }
          h += '</td>';
          h += '</tr>';
        });

        h += '</tbody>';
        h += '</table>';
        h += '</div>';
        h += '<div class="mt-4 text-sm text-gray-600">';
        h += '共 ' + filtered.length + ' 条记录';
        h += '</div>';
        h += '</div>';
        h += '</main>';
        h += '</div>';
        return h;
      }

      getStatusBadge(status) {
        switch (status) {
          case 'active': return '<span class="status-badge status-active">使用中</span>';
          case 'idle': return '<span class="status-badge status-idle">闲置</span>';
          case 'maintenance': return '<span class="status-badge status-maintenance">维修中</span>';
          default: return '<span class="status-badge">' + status + '</span>';
        }
      }

      renderAddPage() {
        let h = '<div class="min-h-screen bg-gray-100">';
        h += '<header class="bg-white shadow-sm">';
        h += '<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center">';
        h += '<button id="back-btn" class="mr-4 text-gray-500 hover:text-gray-700"><i class="fa fa-arrow-left"></i></button>';
        h += '<h1 class="text-xl font-semibold text-blue-600">+ 新增设备</h1>';
        h += '</div>';
        h += '</header>';

        h += '<main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">';
        h += '<div class="bg-white shadow-sm rounded-lg p-6">';
        h += '<form id="add-form" class="space-y-4">';
        h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">';
        
        // 品牌和型号
        h += '<div>';
        h += '<label class="block text-sm font-medium text-gray-700 mb-2">品牌</label>';
        h += '<input type="text" name="brand" placeholder="Dell / Lenovo / HP" required class="w-full px-4 py-2 border rounded">';

            if (index !== -1) {
              const oldAsset = { ...this.assets[index] };
              const newAsset = {
                ...this.assets[index],
                asset_code: formData.get('asset_code'),
                brand: formData.get('brand'),
                model: formData.get('model'),
                cpu: formData.get('cpu'),
                ram: formData.get('ram'),
                storage: formData.get('storage'),
                gpu: formData.get('gpu'),
                os: formData.get('os'),
                user_name: formData.get('user_name'),
                department: formData.get('department'),
                location: formData.get('location'),
                status: formData.get('status'),
                notes: formData.get('notes'),
                updated_at: new Date().toISOString().split('T')[0]
              };
              
              // 添加操作历史
              const changes = [];
              if (oldAsset.user_name !== newAsset.user_name) {
                changes.push(`使用人: ${oldAsset.user_name} → ${newAsset.user_name}`);

              if (oldAsset.department !== newAsset.department) {

              if (oldAsset.location !== newAsset.location) {
                changes.push(`位置: ${oldAsset.location} → ${newAsset.location}`);
              }
              if (oldAsset.status !== newAsset.status) {
                changes.push(`状态: ${oldAsset.status} → ${newAsset.status}`);
              }
              
              if (changes.length > 0) {
                const historyRecord = {
                  user: this.currentUser.email,
                  timestamp: new Date().toISOString(),
                  action: '修改',
                  changes: changes
                };
                
                if (!newAsset.history) {

              }

              this.saveAssets();
              this.currentPage = 'list';
              this.render();
            }
          });
        }
      }

          '</div></div>';
        document.body.appendChild(modal);

          document.body.removeChild(modal);
        });

        document.getElementById('cancel-import-btn').addEventListener('click', () => {
          document.body.removeChild(modal);
        });

        document.getElementById('import-btn').addEventListener('click', () => {
          const fileInput = document.getElementById('import-file');
          const file = fileInput.files[0];
          if (!file) {
            alert('请选择文件');
            return;
          }

          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = new Uint8Array(e.target.result);
              const workbook = XLSX.read(data, { type: 'array' });
              const firstSheetName = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[firstSheetName];
              const jsonData = XLSX.utils.sheet_to_json(worksheet);
              
              let added = 0;
              let updated = 0;
              
              jsonData.forEach(item => {
                // 智能匹配字段
                const mappedAsset = this.mapImportFields(item);
                
                // 系统统一生成资产编码
                const assetCode = 'PC-' + new Date().getFullYear() + '-' + String(this.assets.length + 1 + added).padStart(4, '0');

                // 检查是否已存在（基于计算机名或其他唯一标识）
                const computerName = this.findFieldValue(item, ['计算机名']);
                const existing = computerName ? 
                  this.assets.find(a => a.notes && a.notes.includes('计算机名: ' + computerName)) : 
                  null;
                
                if (existing) {
                  // 更新现有资产
                  Object.assign(existing, mappedAsset, {
                    updated_at: new Date().toISOString().split('T')[0]
                  });
                  updated++;
                } else {
                  // 新增资产
                  const asset = {
                    id: Date.now().toString() + added,
                    ...mappedAsset,
                    created_at: new Date().toISOString().split('T')[0],
                    updated_at: new Date().toISOString().split('T')[0],
                    history: []
                  };
                  
                  // 添加操作历史
                  const historyRecord = {
                    user: this.currentUser.email,
                    timestamp: new Date().toISOString(),
                    action: '导入',
                    changes: ['通过批量导入创建资产：' + assetCode]
                  };
                  asset.history.push(historyRecord);
                  
                  this.assets.push(asset);
                  added++;
                }
              });
              
              this.saveAssets();
              document.body.removeChild(modal);
              alert('导入成功！\n新增：' + added + ' 个资产\n更新：' + updated + ' 个资产');
              this.render();
            } catch (error) {
              alert('导入失败：' + error.message);
            }
          };
          reader.readAsArrayBuffer(file);
        });
      }
      
      mapImportFields(item) {
        // 字段映射配置
        const fieldMappings = {
          asset_code: ['资产编号', '资产编码', 'asset_code', '编号'],
          brand: ['制造商', '品牌', 'brand', '厂商'],
          model: ['型号', 'model', '设备型号'],
          cpu: ['CPU', 'cpu', '处理器', '处理器型号'],
          ram: ['内存(GB)', '内存 (GB)', '内存', 'RAM', 'ram', '内存容量'],
          storage: ['磁盘总容量', '硬盘', '存储', 'storage', '硬盘容量'],
          gpu: ['显卡', '显示芯片', 'gpu', '显卡型号'],
          os: ['操作系统', 'os', '系统'],
          user_name: ['归属人', '使用人', '资产归属', 'user_name', '用户名', '使用者'],
          department: ['部门', 'department', '使用部门'],
          location: ['地点', '位置', 'location', '存放地点'],
          status: ['状态', 'status']
        };
        
        const mapped = {};
        
        // 映射其他字段
        mapped.brand = this.findFieldValue(item, fieldMappings.brand) || '';
        mapped.model = this.findFieldValue(item, fieldMappings.model) || '';
        mapped.cpu = this.findFieldValue(item, fieldMappings.cpu) || '';
        mapped.ram = this.findFieldValue(item, fieldMappings.ram) || '';
        mapped.storage = this.findFieldValue(item, fieldMappings.storage) || '';
        mapped.gpu = this.findFieldValue(item, fieldMappings.gpu) || '';
        mapped.os = this.findFieldValue(item, fieldMappings.os) || '';
        mapped.user_name = this.findFieldValue(item, fieldMappings.user_name) || '';
        mapped.department = this.findFieldValue(item, fieldMappings.department) || '';
        mapped.location = this.findFieldValue(item, fieldMappings.location) || '';
        mapped.status = this.findFieldValue(item, fieldMappings.status) || 'active';
        
        // 构建备注信息（包含其他采集信息）
        const notes = this.buildImportNotes(item);
        mapped.notes = notes;
        
        return mapped;
      }
      
      findFieldValue(item, possibleKeys) {
        for (const key of possibleKeys) {
          if (item.hasOwnProperty(key) && item[key]) {
            return String(item[key]).trim();
          }
        }
        return '';
      }
      
      buildImportNotes(item) {
        // 构建采集原始信息的备注
        const extraFields = {
          '采集时间': item['采集时间'],
          '计算机名': item['计算机名'],
          '域': item['域'],
          '资产标签': item['资产标签'],
          '系统 UUID': item['系统 UUID'],
          'BIOS 序列号': item['BIOS 序列号'],
          '主板序列号': item['主板序列号'],
          '磁盘型号': item['磁盘型号'],
          '磁盘序列号': item['磁盘序列号'],
          'MAC 地址': item['MAC 地址'],
          'IP 地址': item['IP 地址'],
          '系统版本': item['系统版本']
        };
        
        const notes = [];
        for (const [key, value] of Object.entries(extraFields)) {
          if (value) {
            notes.push(key + ': ' + value);
          }
        }
        
        return notes.join(' | ');
      }
      
      formatStorage(value) {
        if (!value) return '-';
        
        // 尝试将值转换为数字并取整
        const num = parseFloat(value);
        if (!isNaN(num)) {
          return Math.round(num) + ' GB';
        }
        
        // 如果转换失败，返回原始值
        return value;
      }

      getAppUrl() {
        if (this.config.deployedUrl) {
          return this.config.deployedUrl;
        }
        return window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/') + window.location.pathname.split('/').pop();
      }

      generateQRCode() {
        const asset = this.assets.find(a => a.id === this.currentAssetId);
        if (!asset) return;

        const qrcodeContainer = document.getElementById('qrcode');
        if (qrcodeContainer) {
          qrcodeContainer.innerHTML = '';
          const appUrl = this.getAppUrl();
          const qrData = appUrl + '?action=edit&id=' + asset.id;
          
          try {
            if (typeof QRCode !== 'undefined') {
              new QRCode(qrcodeContainer, {
                text: qrData,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff'
              });
            } else {
              qrcodeContainer.innerHTML = '<p class="text-red-500">二维码库加载失败</p>';
            }
          } catch (error) {
            qrcodeContainer.innerHTML = '<p class="text-red-500">生成失败</p>';
          }
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new AssetManagementSystem();
    });
  </script>
</body>
</html>
