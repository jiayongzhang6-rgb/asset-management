<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产管理系统</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- 引入React和React DOM -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <!-- 引入React Router -->
  <script src="https://cdn.jsdelivr.net/npm/react-router-dom@6.28.0/dist/umd/react-router-dom.development.js"></script>
  <!-- 引入Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase-js.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#f3f4f6',
            danger: '#ef4444',
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>

  <!-- 引入Babel用于编译JSX -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.12/babel.min.js"></script>

  <script type="text/babel">
    // 配置Supabase
    const supabaseUrl = 'https://cbuugpdoaegydbwuwmvm.supabase.co';
    const supabaseAnonKey = 'sb_publishable_dCFfZEET6kLabsJZNyr8gw_mo4DcprZ';
    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    // 认证上下文
    const AuthContext = React.createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = React.useState(null);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
          setLoading(false);
        });

        return () => subscription.unsubscribe();
      }, []);

      const signIn = async (email, password) => {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
      };

      const signUp = async (email, password) => {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
      };

      const signOut = async () => {
        const { error } = await supabase.auth.signOut();
        if (error) throw error;
      };

      return (
        <AuthContext.Provider value={{ user, loading, signIn, signUp, signOut, isAuthenticated: !!user }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() {
      const context = React.useContext(AuthContext);
      if (context === null) {
        throw new Error('useAuth must be used within an AuthProvider');
      }
      return context;
    }

    // 登录页面
    function Login() {
      const navigate = ReactRouterDOM.useNavigate();
      const { signIn, signUp } = useAuth();
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);
      const [isSignUp, setIsSignUp] = React.useState(false);
      const [error, setError] = React.useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setError('');

        try {
          if (isSignUp) {
            await signUp(email, password);
            alert('注册成功！请检查邮箱确认账户');
          } else {
            await signIn(email, password);
            navigate('/');
          }
        } catch (err) {
          setError(err.message || (isSignUp ? '注册失败' : '登录失败'));
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
          <div className="w-full max-w-md bg-white rounded-lg shadow-md p-8">
            <h2 className="text-2xl font-bold text-center mb-6">
              {isSignUp ? '注册账户' : '登录'}
            </h2>
            {error && (
              <div className="mb-4 p-2 bg-red-100 text-red-700 rounded">
                {error}
              </div>
            )}
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-gray-700 mb-2">邮箱</label>
                <input
                  type="email"
                  className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="your@email.com"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  required
                  disabled={isLoading}
                />
              </div>
              <div>
                <label className="block text-gray-700 mb-2">密码</label>
                <input
                  type="password"
                  className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="••••••••"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  required
                  disabled={isLoading}
                  minLength={6}
                />
              </div>
              <button
                type="submit"
                className="w-full bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600 disabled:bg-gray-400"
                disabled={isLoading}
              >
                {isLoading ? '处理中...' : (isSignUp ? '注册' : '登录')}
              </button>
            </form>
            <div className="mt-4 text-center">
              <button
                onClick={() => setIsSignUp(!isSignUp)}
                className="text-blue-500 hover:underline"
                disabled={isLoading}
              >
                {isSignUp ? '已有账户？点击登录' : '没有账户？点击注册'}
              </button>
            </div>
            <div className="mt-4">
              <button
                onClick={() => navigate('/')}
                className="w-full border border-gray-300 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-100"
                disabled={isLoading}
              >
                返回首页
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 资产列表页面
    function Index() {
      const navigate = ReactRouterDOM.useNavigate();
      const { isAuthenticated } = useAuth();
      const [assets, setAssets] = React.useState([
        {
          id: '1',
          asset_code: 'PC-2026-0001',
          brand: 'Dell',
          model: 'OptiPlex 7090',
          cpu: 'Intel Core i7-10700',
          ram: '16GB DDR4',
          storage: '512GB SSD',
          gpu: 'NVIDIA GeForce GTX 1650',
          os: 'Windows 11 Pro',
          department: '研发部',
          user_name: '张伟',
          location: 'A栋3楼-301',
          status: 'active',
          notes: '高性能开发机器',
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        },
        {
          id: '2',
          asset_code: 'PC-2026-0002',
          brand: 'Lenovo',
          model: 'ThinkPad X1 Carbon',
          cpu: 'Intel Core i5-1135G7',
          ram: '8GB DDR4',
          storage: '256GB SSD',
          gpu: 'Intel Iris Xe Graphics',
          os: 'Windows 10 Pro',
          department: '市场部',
          user_name: '李娜',
          location: 'B栋2楼-205',
          status: 'active',
          notes: '商务笔记本',
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        }
      ]);
      const [loading, setLoading] = React.useState(false);
      const [searchTerm, setSearchTerm] = React.useState('');
      const [selectedIds, setSelectedIds] = React.useState([]);
      const [isAddDialogOpen, setIsAddDialogOpen] = React.useState(false);
      const [isEditDialogOpen, setIsEditDialogOpen] = React.useState(false);
      const [editingAsset, setEditingAsset] = React.useState(null);
      const [formData, setFormData] = React.useState({
        brand: '',
        model: '',
        cpu: '',
        ram: '',
        storage: '',
        gpu: '',
        os: '',
        department: '',
        user_name: '',
        location: '',
        status: 'active',
        notes: ''
      });

      const fetchAssets = async () => {
        setLoading(true);
        try {
          const { data, error } = await supabase
            .from('assets')
            .select('*')
            .order('created_at', { ascending: false });
          if (error) throw error;
          setAssets(data || []);
        } catch (error) {
          console.error('Error fetching assets:', error);
        } finally {
          setLoading(false);
        }
      };

      React.useEffect(() => {
        fetchAssets();
      }, []);

      const filteredAssets = assets.filter(asset =>
        asset.asset_code?.toLowerCase().includes(searchTerm.toLowerCase()) ||
        asset.brand?.toLowerCase().includes(searchTerm.toLowerCase()) ||
        asset.model?.toLowerCase().includes(searchTerm.toLowerCase()) ||
        asset.department?.toLowerCase().includes(searchTerm.toLowerCase()) ||
        asset.user_name?.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const handleSelectAll = (checked) => {
        if (checked) {
          setSelectedIds(filteredAssets.map(asset => asset.id));
        } else {
          setSelectedIds([]);
        }
      };

      const handleSelectOne = (id, checked) => {
        if (checked) {
          setSelectedIds([...selectedIds, id]);
        } else {
          setSelectedIds(selectedIds.filter(selectedId => selectedId !== id));
        }
      };

      const handleAddSubmit = async (e) => {
        e.preventDefault();
        try {
          const { error } = await supabase.from('assets').insert([formData]);
          if (error) throw error;
          await fetchAssets();
          setIsAddDialogOpen(false);
          resetForm();
          alert('资产添加成功');
        } catch (error) {
          console.error('Error adding asset:', error);
          alert('资产添加失败');
        }
      };

      const handleEditSubmit = async (e) => {
        e.preventDefault();
        if (editingAsset) {
          try {
            const { error } = await supabase.from('assets').update(formData).eq('id', editingAsset.id);
            if (error) throw error;
            await fetchAssets();
            setIsEditDialogOpen(false);
            setEditingAsset(null);
            resetForm();
            alert('资产更新成功');
          } catch (error) {
            console.error('Error updating asset:', error);
            alert('资产更新失败');
          }
        }
      };

      const handleEdit = (asset) => {
        setEditingAsset(asset);
        setFormData({
          brand: asset.brand || '',
          model: asset.model || '',
          cpu: asset.cpu || '',
          ram: asset.ram || '',
          storage: asset.storage || '',
          gpu: asset.gpu || '',
          os: asset.os || '',
          department: asset.department || '',
          user_name: asset.user_name || '',
          location: asset.location || '',
          status: asset.status || 'active',
          notes: asset.notes || ''
        });
        setIsEditDialogOpen(true);
      };

      const handleDelete = async (id) => {
        if (confirm('确定要删除这个资产吗？')) {
          try {
            const { error } = await supabase.from('assets').delete().eq('id', id);
            if (error) throw error;
            await fetchAssets();
            alert('资产删除成功');
          } catch (error) {
            console.error('Error deleting asset:', error);
            alert('资产删除失败');
          }
        }
      };

      const handleBatchDelete = async () => {
        if (selectedIds.length === 0) {
          alert('请选择要删除的资产');
          return;
        }
        if (confirm(`确定要删除选中的 ${selectedIds.length} 个资产吗？`)) {
          try {
            const { error } = await supabase.from('assets').delete().in('id', selectedIds);
            if (error) throw error;
            await fetchAssets();
            setSelectedIds([]);
            alert('资产删除成功');
          } catch (error) {
            console.error('Error deleting assets:', error);
            alert('资产删除失败');
          }
        }
      };

      const resetForm = () => {
        setFormData({
          brand: '',
          model: '',
          cpu: '',
          ram: '',
          storage: '',
          gpu: '',
          os: '',
          department: '',
          user_name: '',
          location: '',
          status: 'active',
          notes: ''
        });
      };

      const getStatusBadge = (status) => {
        const labels = {
          active: '使用中',
          idle: '闲置',
          maintenance: '维修中'
        };
        const colors = {
          active: 'bg-green-100 text-green-800',
          idle: 'bg-yellow-100 text-yellow-800',
          maintenance: 'bg-red-100 text-red-800'
        };
        return (
          <span className={`px-2 py-1 rounded text-xs font-medium ${colors[status] || 'bg-gray-100 text-gray-800'}`}>
            {labels[status] || status}
          </span>
        );
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-screen">
            <div className="text-lg">加载中...</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-100">
          <header className="bg-white shadow">
            <div className="container mx-auto px-4 py-4 flex items-center justify-between">
              <h1 className="text-2xl font-bold">资产管理系统</h1>
              <div className="flex items-center gap-4">
                {isAuthenticated ? (
                  <button
                    onClick={() => navigate('/import')}
                    className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
                  >
                    导入
                  </button>
                ) : (
                  <button
                    onClick={() => navigate('/login')}
                    className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                  >
                    登录
                  </button>
                )}
              </div>
            </div>
          </header>

          <main className="container mx-auto px-4 py-8">
            <div className="bg-white rounded-lg shadow p-6">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-xl font-semibold">资产列表</h2>
                <div className="flex items-center gap-4">
                  <div className="relative">
                    <input
                      type="text"
                      placeholder="搜索资产..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="pl-10 pr-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                    <i className="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                  </div>
                  {isAuthenticated && (
                    <>
                      {selectedIds.length > 0 && (
                        <button
                          onClick={handleBatchDelete}
                          className="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600"
                        >
                          删除选中 ({selectedIds.length})
                        </button>
                      )}
                      <button
                        onClick={() => setIsAddDialogOpen(true)}
                        className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                      >
                        添加资产
                      </button>
                    </>
                  )}
                </div>
              </div>

              <div className="overflow-x-auto">
                <table className="min-w-full divide-y divide-gray-200">
                  <thead className="bg-gray-50">
                    <tr>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-12">
                        {isAuthenticated && (
                          <input
                            type="checkbox"
                            checked={selectedIds.length === filteredAssets.length && filteredAssets.length > 0}
                            onChange={(e) => handleSelectAll(e.target.checked)}
                            className="rounded text-blue-600 focus:ring-blue-500"
                          />
                        )}
                      </th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产编码</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">品牌</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">型号</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CPU</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">内存</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">存储</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">显卡</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作系统</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部门</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">位置</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                      {isAuthenticated && <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-24">操作</th>}
                    </tr>
                  </thead>
                  <tbody className="bg-white divide-y divide-gray-200">
                    {filteredAssets.map((asset) => (
                      <tr key={asset.id} className="hover:bg-gray-50 cursor-pointer" onClick={() => navigate(`/asset/${asset.id}`)}>
                        <td className="px-4 py-3" onClick={(e) => e.stopPropagation()}>
                          {isAuthenticated && (
                            <input
                              type="checkbox"
                              checked={selectedIds.includes(asset.id)}
                              onChange={(e) => handleSelectOne(asset.id, e.target.checked)}
                              className="rounded text-blue-600 focus:ring-blue-500"
                            />
                          )}
                        </td>
                        <td className="px-4 py-3 text-sm font-medium text-gray-900">{asset.asset_code}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.brand}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.model}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.cpu}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.ram}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.storage}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.gpu || '-'}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.os}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.department}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.user_name}</td>
                        <td className="px-4 py-3 text-sm text-gray-900">{asset.location}</td>
                        <td className="px-4 py-3 text-sm">{getStatusBadge(asset.status)}</td>
                        {isAuthenticated && (
                          <td className="px-4 py-3 text-sm" onClick={(e) => e.stopPropagation()}>
                            <div className="flex items-center gap-2">
                              <button
                                onClick={() => handleEdit(asset)}
                                className="text-blue-500 hover:underline"
                              >
                                编辑
                              </button>
                              <button
                                onClick={() => handleDelete(asset.id)}
                                className="text-red-500 hover:underline"
                              >
                                删除
                              </button>
                            </div>
                          </td>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {filteredAssets.length === 0 && (
                <div className="text-center py-8 text-gray-500">
                  没有找到资产
                </div>
              )}
            </div>
          </main>

          {/* 添加资产对话框 */}
          {isAddDialogOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-lg max-w-2xl w-full max-h-[80vh] overflow-y-auto">
                <div className="p-6">
                  <h3 className="text-xl font-semibold mb-4">添加新资产</h3>
                  <form onSubmit={handleAddSubmit} className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-gray-700 mb-2">品牌</label>
                        <input
                          type="text"
                          value={formData.brand}
                          onChange={(e) => setFormData({ ...formData, brand: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-gray-700 mb-2">型号</label>
                        <input
                          type="text"
                          value={formData.model}
                          onChange={(e) => setFormData({ ...formData, model: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-gray-700 mb-2">CPU</label>
                        <input
                          type="text"
                          value={formData.cpu}
                          onChange={(e) => setFormData({ ...formData, cpu: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-gray-700 mb-2">内存</label>
                        <input
                          type="text"
                          value={formData.ram}
                          onChange={(e) => setFormData({ ...formData, ram: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-gray-700 mb-2">存储</label>
                        <input
                          type="text"
                          value={formData.storage}
                          onChange={(e) => setFormData({ ...formData, storage: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-gray-700 mb-2">显卡</label>
                        <input
                          type="text"
                          value={formData.gpu}
                          onChange={(e) => setFormData({ ...formData, gpu: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                      </div>
                      <div>
                        <label className="block text-gray-700 mb-2">操作系统</label>
                        <input
                          type="text"
                          value={formData.os}
                          onChange={(e) => setFormData({ ...formData, os: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                          required
                        />
                      </div>
                      <div>
                        <label className="block text-gray-700 mb-2">部门</label>
                        <input
                          type="text"
                          value={formData.department}
                          onChange={(e) => setFormData({ ...formData, department: e.target.value })}
                          className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                          required
                        />

    function AssetDetail() {
      const { id } = ReactRouterDOM.useParams();
      const navigate = ReactRouterDOM.useNavigate();
      const { isAuthenticated } = useAuth();
      const [asset, setAsset] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [showQRCode, setShowQRCode] = React.useState(false);

      React.useEffect(() => {
        if (id) {
          fetchAsset();
        }
      }, [id]);

      const fetchAsset = async () => {
        setLoading(true);
        try {
          const { data, error } = await supabase
            .from('assets')
            .select('*')
            .eq('id', id)
            .single();
          if (error) throw error;
          setAsset(data);
        } catch (error) {
          console.error('Error fetching asset:', error);
        } finally {
          setLoading(false);
        }
      };

      const handleDelete = async () => {
        if (asset && confirm('确定要删除这个资产吗？')) {
          try {
            const { error } = await supabase.from('assets').delete().eq('id', asset.id);
            if (error) throw error;
            navigate('/');
            alert('资产删除成功');
          } catch (error) {
            console.error('Error deleting asset:', error);
            alert('资产删除失败');
          }
        }

        const labels = {
          active: '使用中',
          idle: '闲置',
          maintenance: '维修中'

        const colors = {
          active: 'bg-green-100 text-green-800',
          idle: 'bg-yellow-100 text-yellow-800',
          maintenance: 'bg-red-100 text-red-800'
        };
        return (
          <span className={`px-2 py-1 rounded text-xs font-medium ${colors[status] || 'bg-gray-100 text-gray-800'}`}>
            {labels[status] || status}
          </span>
        );
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-screen">
            <div className="text-lg">加载中...</div>
          </div>
        );
      }

      if (!asset) {
        return (
          <div className="flex items-center justify-center h-screen">
            <div className="text-lg">资产不存在</div>

        );

      return (

              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-xl font-semibold mb-4">导入说明</h2>
                <ul className="space-y-2 text-sm text-gray-600">
                  <li>1. 下载模板文件，按照模板格式填写资产信息</li>
                  <li>2. 支持的字段：品牌、型号、CPU、内存、存储、显卡、操作系统、部门、用户、位置、状态、备注</li>
                  <li>3. 状态字段可选值：active（使用中）、idle（闲置）、maintenance（维修中）</li>
                  <li>4. 必填字段：品牌、型号、CPU、内存、存储、操作系统、部门、用户、位置</li>
                  <li>5. 上传文件后会显示预览，确认无误后点击开始导入</li>
                </ul>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // 404页面
    function NotFound() {
      const navigate = ReactRouterDOM.useNavigate();

      return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-lg shadow-md p-8 max-w-md text-center">
            <div className="text-6xl font-bold text-gray-400 mb-4">404</div>
            <h2 className="text-2xl font-bold mb-2">页面未找到</h2>
            <p className="text-gray-600 mb-6">抱歉，您访问的页面不存在或已被删除。</p>
            <div className="flex gap-2 justify-center">
              <button
                onClick={() => navigate('/')}
                className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
              >
                返回首页
              </button>
              <button
                onClick={() => navigate(-1)}
                className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
              >
                返回上一页
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 主应用
    function App() {
      return (
        <AuthProvider>
          <ReactRouterDOM.BrowserRouter>
            <ReactRouterDOM.Routes>
              <ReactRouterDOM.Route path="/" element={<Index />} />
              <ReactRouterDOM.Route path="/asset/:id" element={<AssetDetail />} />
              <ReactRouterDOM.Route path="/login" element={<Login />} />
              <ReactRouterDOM.Route path="/import" element={<Import />} />
              <ReactRouterDOM.Route path="*" element={<NotFound />} />
            </ReactRouterDOM.Routes>
          </ReactRouterDOM.BrowserRouter>
        </AuthProvider>
      );
    }

    // 渲染应用
    ReactDOM.createRoot(document.getElementById('root')).render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );
  </script>
</body>
</html>
