<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT资产管理系统</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#f3f4f6',
            danger: '#ef4444',
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="min-h-screen bg-gray-100">
    <header class="bg-blue-600 text-white shadow">
      <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <h1 class="text-xl font-bold">IT资产管理系统</h1>
        <div class="flex items-center gap-3">
          <span class="text-sm">test@example.com</span>
          <button class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">
            批量导入
          </button>
          <button class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">
            + 新增设备
          </button>
          <button class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">
            <i class="fa fa-cog"></i> 设置
          </button>
          <button class="px-3 py-1 bg-white text-blue-600 rounded text-sm hover:bg-gray-100">
            退出
          </button>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-4 py-6">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex items-center gap-3">
            <div class="p-3 bg-blue-100 rounded-lg">
              <i class="fa fa-desktop text-blue-600 text-xl"></i>
            </div>
            <div>
              <p class="text-sm text-gray-500">资产总数</p>
              <p class="text-2xl font-bold">10</p>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex items-center gap-3">
            <div class="p-3 bg-green-100 rounded-lg">
              <i class="fa fa-check-circle text-green-600 text-xl"></i>
            </div>
            <div>
              <p class="text-sm text-gray-500">使用中</p>
              <p class="text-2xl font-bold">8</p>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex items-center gap-3">
            <div class="p-3 bg-yellow-100 rounded-lg">
              <i class="fa fa-clock-o text-yellow-600 text-xl"></i>
            </div>
            <div>
              <p class="text-sm text-gray-500">闲置</p>
              <p class="text-2xl font-bold">2</p>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
          <div class="flex items-center gap-3">
            <div class="p-3 bg-red-100 rounded-lg">
              <i class="fa fa-trash text-red-600 text-xl"></i>
            </div>
            <div>
              <p class="text-sm text-gray-500">报废</p>
              <p class="text-2xl font-bold">0</p>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-4">
            <div class="relative">
              <input
                type="text"
                placeholder="搜索资产编码、品牌、使用人..."
                class="pl-10 pr-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
              <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
            <select class="px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部部门</option>
            </select>
            <select class="px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部状态</option>
            </select>
          </div>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-12">
                  <input
                    type="checkbox"
                    class="rounded text-blue-600 focus:ring-blue-500"
                  />
                </th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产编码</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CPU</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">内存</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">存储</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">显卡</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作系统</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部门</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">位置</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">品牌型号</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-24">操作</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
              <tr class="hover:bg-gray-50 cursor-pointer">
                <td class="px-4 py-3">
                  <input
                    type="checkbox"
                    class="rounded text-blue-600 focus:ring-blue-500"
                  />
                </td>
                <td class="px-4 py-3 text-sm font-medium text-gray-900">PC-2026-04-001</td>
                <td class="px-4 py-3 text-sm text-gray-900">Intel i7-12700K</td>
                <td class="px-4 py-3 text-sm text-gray-900">16GB</td>
                <td class="px-4 py-3 text-sm text-gray-900">512GB SSD</td>
                <td class="px-4 py-3 text-sm text-gray-900">RTX 3070</td>
                <td class="px-4 py-3 text-sm text-gray-900">Windows 11</td>
                <td class="px-4 py-3 text-sm text-gray-900">技术部</td>
                <td class="px-4 py-3 text-sm text-gray-900">张三</td>
                <td class="px-4 py-3 text-sm text-gray-900">A101</td>
                <td class="px-4 py-3 text-sm text-gray-900">Dell XPS 13</td>
                <td class="px-4 py-3 text-sm">
                  <span class="px-2 py-1 rounded text-xs font-medium bg-green-100 text-green-800">
                    使用中
                  </span>
                </td>
                <td class="px-4 py-3 text-sm">
                  <div class="flex items-center gap-2">
                    <button class="text-blue-500 hover:underline">
                      编辑
                    </button>
                    <button class="text-red-500 hover:underline">
                      删除
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
