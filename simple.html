<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产管理系统</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#f3f4f6',
            danger: '#ef4444',
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>

  <script>
    // 简单的资产管理系统
    const assets = [
      {
        id: '1',
        asset_code: 'PC-2026-0001',
        brand: 'Dell',
        model: 'OptiPlex 7090',
        cpu: 'Intel Core i7-10700',
        ram: '16GB DDR4',
        storage: '512GB SSD',
        gpu: 'NVIDIA GeForce GTX 1650',
        os: 'Windows 11 Pro',
        department: '研发部',
        user_name: '张伟',
        location: 'A栋3楼-301',
        status: 'active',
        notes: '高性能开发机器',
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      },
      {
        id: '2',
        asset_code: 'PC-2026-0002',
        brand: 'Lenovo',
        model: 'ThinkPad X1 Carbon',
        cpu: 'Intel Core i5-1135G7',
        ram: '8GB DDR4',
        storage: '256GB SSD',
        gpu: 'Intel Iris Xe Graphics',
        os: 'Windows 10 Pro',
        department: '市场部',
        user_name: '李娜',
        location: 'B栋2楼-205',
        status: 'active',
        notes: '商务笔记本',
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      }
    ];

    function getStatusBadge(status) {
      const labels = {
        active: '使用中',
        idle: '闲置',
        maintenance: '维修中'
      };
      const colors = {
        active: 'bg-green-100 text-green-800',
        idle: 'bg-yellow-100 text-yellow-800',
        maintenance: 'bg-red-100 text-red-800'
      };
      return `
        <span class="px-2 py-1 rounded text-xs font-medium ${colors[status] || 'bg-gray-100 text-gray-800'}">
          ${labels[status] || status}
        </span>
      `;
    }

    function renderAssets() {
      const root = document.getElementById('root');
      root.innerHTML = `
        <header class="bg-white shadow">
          <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold">资产管理系统</h1>
            <div class="flex items-center gap-4">
              <button class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                登录
              </button>
            </div>
          </div>
        </header>

        <main class="container mx-auto px-4 py-8">
          <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-xl font-semibold">资产列表</h2>
              <div class="flex items-center gap-4">
                <div class="relative">
                  <input
                    type="text"
                    placeholder="搜索资产..."
                    class="pl-10 pr-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                  <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>
                <button class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                  添加资产
                </button>
              </div>
            </div>

            <div class="overflow-x-auto">
              <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产编码</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">品牌</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">型号</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CPU</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">内存</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">存储</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">显卡</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作系统</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部门</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">位置</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                  </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                  ${assets.map(asset => `
                    <tr class="hover:bg-gray-50">
                      <td class="px-4 py-3 text-sm font-medium text-gray-900">${asset.asset_code}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.brand}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.model}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.cpu}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.ram}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.storage}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.gpu || '-'}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.os}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.department}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.user_name}</td>
                      <td class="px-4 py-3 text-sm text-gray-900">${asset.location}</td>
                      <td class="px-4 py-3 text-sm">${getStatusBadge(asset.status)}</td>
                      <td class="px-4 py-3 text-sm">
                        <div class="flex items-center gap-2">
                          <button class="text-blue-500 hover:underline">
                            编辑
                          </button>
                          <button class="text-red-500 hover:underline">
                            删除
                          </button>
                        </div>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </main>
      `;
    }

    // 渲染页面
    renderAssets();

    // 添加事件监听器
    function addEventListeners() {
      // 登录按钮
      const buttons = document.querySelectorAll('button');
      buttons.forEach(button => {
        if (button.textContent.includes('登录')) {
          button.addEventListener('click', function() {
            alert('登录功能开发中');
          });
        } else if (button.textContent.includes('添加资产')) {
          button.addEventListener('click', function() {
            alert('添加资产功能开发中');
          });
        } else if (button.textContent.includes('编辑')) {
          button.addEventListener('click', function() {
            alert('编辑资产功能开发中');
          });
        } else if (button.textContent.includes('删除')) {
          button.addEventListener('click', function() {
            if (confirm('确定要删除这个资产吗？')) {
              alert('资产删除成功');
            }
          });
        }
      });

      // 搜索功能
      const searchInput = document.querySelector('input[placeholder="搜索资产..."]');
      if (searchInput) {
        searchInput.addEventListener('input', function(e) {
          const searchTerm = e.target.value.toLowerCase();
          const rows = document.querySelectorAll('tbody tr');
          rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            if (text.includes(searchTerm)) {
              row.style.display = '';
            } else {
              row.style.display = 'none';
            }
          });
        });
      }
    }

    // 等待DOM加载完成后添加事件监听器
    document.addEventListener('DOMContentLoaded', addEventListeners);
  </script>
</body>
</html>
