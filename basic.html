<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产管理系统</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow p-6">
      <h1 class="text-2xl font-bold mb-6">资产管理系统</h1>
      
      <h2 class="text-xl font-semibold mb-4">资产列表</h2>
      
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产编码</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">品牌</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">型号</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">显卡</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部门</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr class="hover:bg-gray-50">
              <td class="px-4 py-3 text-sm font-medium text-gray-900">PC-2026-0001</td>
              <td class="px-4 py-3 text-sm text-gray-900">Dell</td>
              <td class="px-4 py-3 text-sm text-gray-900">OptiPlex 7090</td>
              <td class="px-4 py-3 text-sm text-gray-900">NVIDIA GeForce GTX 1650</td>
              <td class="px-4 py-3 text-sm text-gray-900">研发部</td>
              <td class="px-4 py-3 text-sm text-gray-900">张伟</td>
            </tr>
            <tr class="hover:bg-gray-50">
              <td class="px-4 py-3 text-sm font-medium text-gray-900">PC-2026-0002</td>
              <td class="px-4 py-3 text-sm text-gray-900">Lenovo</td>
              <td class="px-4 py-3 text-sm text-gray-900">ThinkPad X1 Carbon</td>
              <td class="px-4 py-3 text-sm text-gray-900">Intel Iris Xe Graphics</td>
              <td class="px-4 py-3 text-sm text-gray-900">市场部</td>
              <td class="px-4 py-3 text-sm text-gray-900">李娜</td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <div class="mt-6 flex gap-4">
        <button id="addButton" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
          添加资产
        </button>
        <button id="deleteButton" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
          删除资产
        </button>
      </div>
    </div>
  </div>

  <script>
    // 简单的事件处理
    document.getElementById('addButton').addEventListener('click', function() {
      alert('添加资产功能');
    });
    
    document.getElementById('deleteButton').addEventListener('click', function() {
      alert('删除资产功能');
    });
  </script>
</body>
</html>
